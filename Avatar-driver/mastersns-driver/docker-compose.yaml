services:
    angue_app:
        build:
            context: ./docker/dev/app
            dockerfile: Dockerfile
        image: angue_app
        container_name: angue_app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./ange_mastersns:/var/www:cached
            - ./docker/dev/app/www.conf:/usr/local/etc/php-fpm.d/www.conf:ro
            - ./docker/domain/logs/toppage:/domain/logs/toppage
        env_file: .env
        environment:
            - AWS_SUPPRESS_PHP_DEPRECATION_WARNING=true

    angue_webserver:
        image: nginx:1.20-alpine
        container_name: angue_webserver
        restart: unless-stopped
        ports:
            - "${APP_PORT:-8216}:80"
        depends_on:
            - angue_app
        volumes:
            - ./ange_mastersns:/var/www:cached
            - ./docker/dev/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    db:
        image: mysql:8.0
        # command: mysqld --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
        ports:
            - '13506:3306'
        environment:
            MYSQL_ROOT_PASSWORD: "11111111"
        volumes:
            - './docker/db/db_data:/var/lib/mysql'
            - './mysql/00_init_db.sql:/docker-entrypoint-initdb.d/00_init_db.sql'

    cms_phpmyadmin:
        image: phpmyadmin
        container_name: angue_phpmyadmin
        restart: unless-stopped
        ports:
            - "${PHPMYADMIN_PORT:-8215}:80"
        links:
            - db
        environment:
            PMA_HOST: db
            PMA_PORT: 3306
            # PMA_ARBITRARY: 1
            PMA_USER: root
            PMA_PASSWORD: "11111111"
    redis:
        image: redis
        ports:
            - "6579:6379"

