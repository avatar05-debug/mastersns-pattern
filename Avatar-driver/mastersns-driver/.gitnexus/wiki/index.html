var PAGES = {"admin-management-portal":"# Admin & Management Portal\n\n# Admin & Management Portal Module\n\nThe **Admin & Management Portal** is a centralized control system built on the FuelPHP framework. It provides the infrastructure for administrative oversight, content moderation, statistical aggregation, and system maintenance. It serves as the gatekeeper for administrative access, enforcing granular permissions while logging all sensitive operations.\n\n## Core Architecture\n\nThe module follows a hierarchical controller structure where `Controller_Admin` serves as the base class, providing essential lifecycle hooks, security checks, and global view variables.\n\n```mermaid\ngraph TD\n    Base[Controller_Admin] --> Check[Controller_Admincheck]\n    Base --> Sum[Controller_Adminsum]\n    Base --> Daily[Controller_AdminDaily]\n    Check --> Moderation[Content Moderation]\n    Sum --> Stats[Aggregation & Reporting]\n    Base --> Auth[Auth & Privilege System]\n```\n\n### Base Controller (`Controller_Admin`)\nThis is the foundation of all administrative routes. Its primary responsibilities include:\n*   **Session & Environment Initialization:** Loads administrative sessions and defines global constants like `VIEW_FOLDER` and `START_PROCESS_TIME`.\n*   **Maintenance Mode Enforcement:** Checks the `admin_maintenance` flag. It allows bypasses for specific developer IPs (NB worker IPs) while redirecting others to a maintenance splash page.\n*   **Load Average Monitoring:** Executes `loadaverage_chk()` to prevent system instability. If the server load exceeds configured thresholds, administrators are redirected to an alert page to prevent further resource exhaustion.\n*   **Template Resolution:** The `get_template()` method handles dynamic pathing for Smarty templates, allowing for content-specific overrides.\n\n## Security & Permissions\n\nThe module implements a two-tier authorization system managed via `Model_Admin`.\n\n### 1. Privilege & Permission Checks\n*   **Category Level (`check_privilege`):** Validates if an admin has access to a broad functional area (e.g., \"Member Management\" or \"System Settings\").\n*   **Action Level (`check_permission`):** Validates if an admin can perform a specific action within a category (e.g., \"Edit Email\" vs. \"View Profile\").\n*   **Superadmin Bypass:** Users assigned to the `superadmin` group bypass all permission checks.\n\n### 2. Audit Logging (`Model_AdminLog`)\nEvery significant action is recorded in the `admin_logs` table.\n*   **Log Types:** Differentiates between `TYPE_VIEW` (accessing data) and `TYPE_OPE` (modifying data).\n*   **Place Constants:** Uses a four-digit code system (e.g., `0201` for Member Search) to categorize where an action occurred.\n*   **Data Masking:** Includes logic to mask sensitive information like Email addresses and Phone numbers if the viewing administrator lacks specific high-level security roles.\n\n## Content Moderation (`Controller_Admincheck`)\n\nThis sub-module handles the manual review of user-generated content. It provides standardized tools for filtering and processing data.\n\n### Key Moderation Features:\n*   **NG Word Filtering:** `getNgWordWhere()` generates complex SQL queries to find content containing forbidden words using both standard `LIKE` patterns and `REGEXP`.\n*   **Status Management:** Standardizes content states across the platform (Unchecked, Display, Hidden, Web-only).\n*   **Automated Intervals:** `action_update_autotime()` allows admins to configure how frequently moderation queues refresh for different content types (Images, Profiles, Messages).\n\n## Statistics & Aggregation (`Controller_Adminsum`)\n\nThe aggregation engine provides business intelligence through various search dimensions:\n*   **Dimensions:** Supports grouping data by Ad Code, DateTime, Date, Month, and Prefecture.\n*   **Dynamic Query Building:** Uses `makeWhereDetail` and `makeWhereDate` to build complex filtering logic for registration and activity reports.\n*   **Pager Integration:** Implements `getPagingConfig` to handle large datasets, ensuring search parameters are persisted across paginated results via URL encoding.\n\n## Data Models\n\n### `Model_Admin`\nThe primary entity representing an administrative user. It links to the core `Model_User` (via the `mgpf` database connection) and manages the relationship with administrative roles and privileges.\n\n### `Model_AdminCheck`\nA utility model providing static helper methods for moderation logic. It contains the logic for:\n*   **Age Verification:** Constants for image check results (e.g., \"ID unclear\", \"Expired\").\n*   **SQL Generation:** Shared logic for generating `WHERE` clauses for date ranges and NG word matches used across multiple moderation controllers.\n\n## Implementation Patterns\n\n### Standardized Search Flow\nMost administrative search actions follow this execution pattern:\n1.  **Condition Gathering:** Collect inputs from `Input::post` or `Input::get`.\n2.  **Query Construction:** Pass the query object through `makeWhereDetail` and `makeWhereDate`.\n3.  **Pagination:** Calculate totals and initialize the FuelPHP Pagination class.\n4.  **Logging:** Record the search parameters and execution time in `Model_AdminLog`.\n\n### Global View Variables\nThe `before()` method in `Controller_Admincheck` and `Controller_Adminsum` populates the Smarty view engine with standardized lists (Sex, Prefectures, Status codes). This ensures UI consistency across all management screens.","api-layer":"# API Layer\n\n# API Layer Documentation\n\nThe API Layer serves as the primary interface between the client applications (Web and Native Mobile) and the system's business logic. It is built on top of the FuelPHP `Controller_Rest` class and provides standardized request handling, security validation, and response formatting.\n\n## Core Controllers\n\n### 1. Controller_Api\nThe base class for standard RESTful API endpoints, primarily used by the web front-end and general service integrations.\n\n*   **Format**: Defaults to `json`.\n*   **Authentication**: Uses a signature-based mechanism (`signatureCheck`) to validate requests.\n*   **Session Management**: Validates session cookies for web-based requests via `_isSessionCookie`.\n*   **Key Method**: `setResponse($response, $status)` - Standardizes the success status in the JSON payload.\n\n### 2. Controller_Appapi\nThe specialized base class for Native Mobile Application (iOS/Android) endpoints. It handles complex state synchronization between the app and the server.\n\n*   **Security**: Implements a time-sensitive signature check (`API_TIMEOUT = 180` seconds) and decrypts sensitive fields like `uuid`, `email`, and `password` using `MyEncrypt`.\n*   **State Management**: The `makeResponse` method is the central engine for calculating the \"App State,\" including:\n    *   Member status (Normal, Pre, Stop, etc.)\n    *   Maintenance mode status.\n    *   Force update requirements.\n    *   Unread message counts and badge data.\n    *   Matching alerts and bonus point eligibility.\n*   **Version Control**: Handles \"Examination Mode\" (審査モード) to toggle features or domains during App Store/Google Play reviews.\n\n---\n\n## Request Lifecycle & Security\n\nThe API layer enforces a strict validation flow before executing any business logic.\n\n```mermaid\ngraph TD\n    A[Client Request] --> B{signatureCheck}\n    B -- Invalid --> C[403/Security Error]\n    B -- Valid --> D[Decrypt Payload]\n    D --> E[Execute Action]\n    E --> F[makeResponse / setResponse]\n    F --> G[Update Last Login/Device Info]\n    G --> H[JSON Output]\n```\n\n### Signature Validation\nFor mobile requests, the `sign` parameter is a comma-separated string containing a signature and a timestamp, encrypted.\n1.  **Decryption**: The system decrypts the signature.\n2.  **Expiration**: If `time() - timestamp > 180`, the request is rejected.\n3.  **Field Decryption**: Specific fields (e.g., `birthday`, `uid`) are automatically decrypted if present in the `postdata`.\n\n---\n\n## Key Functional Components\n\n### Member Authentication & Registration (`Controller_App_Api_Mem`)\nHandles the lifecycle of a mobile user:\n*   **UUID Management**: `action_check_uuid` and `action_set_uuid` link physical devices to member accounts.\n*   **Social Integration**: `action_create_fb_member` and `action_link_fb_member` handle Facebook OAuth registration and account linking, including profile picture synchronization.\n*   **Profile Management**: `post_set_member_prof` and `post_set_basic` update user attributes while triggering `Model_ProcessLog` entries for auditing.\n\n### Search & Discovery (`Controller_App_Apiv2_Search`)\nProvides the data for the app's main discovery interfaces:\n*   **Main Feed**: `post_main` calculates the user list based on complex sorting (Recommend, Login, Registration, or Nice Count).\n*   **Simple Search**: `action_simpletop` and `post_simple` provide \"Easy Search\" categories (e.g., \"Users nearby\", \"New members\").\n*   **Aocca (Matching)**: Manages the \"Aocca\" specific search mode and purpose-based filtering.\n\n### Response Augmentation (`makeResponse`)\nUnlike standard REST controllers that return only the requested resource, `Controller_Appapi::makeResponse` injects global metadata required by the mobile app to function correctly:\n*   `is_maintenance`: Boolean flag to trigger the app's maintenance screen.\n*   `is_force_update`: Boolean flag to redirect users to the App Store.\n*   `bonus`: Information regarding login bonuses or profile completion rewards.\n*   `matching`: Real-time alerts if a new match has occurred.\n\n---\n\n## Developer Usage Patterns\n\n### Implementing a New Mobile API Endpoint\nWhen extending `Controller_Appapi`, follow this pattern:\n\n```php\npublic function action_my_endpoint()\n{\n    // 1. Security Check\n    if (!$this->signatureCheck()) {\n        return $this->setResponse([], Consts::API_SUCCESS_SECURITYERR);\n    }\n\n    // 2. Business Logic\n    $data = Model_Custom::do_work($this->postdata);\n\n    // 3. Return via makeResponse to include App State\n    $resmem = Model_Member::getApiResMember($this->sign);\n    return Response::forge(json_encode(\n        $this->makeResponse(Consts::API_SUCCESS_OK, $resmem, ['payload' => $data])\n    ));\n}\n```\n\n### Debugging\nUse the internal `debug()` method. It automatically captures the `ACCESS_URI` and `ACCESS_USERNAME` (if available) and logs the data to the FuelPHP logs.\n*   `$this->debug($data, 0)`: Warning (Default)\n*   `$this->debug($data, 1)`: Info\n*   `$this->debug($data, 3)`: Error\n\n### Maintenance & Versioning\nMaintenance mode and Force Updates are controlled via `Model_Extend`. The API layer checks these settings in every `makeResponse` call, allowing for immediate global control over app access without code deployments.","authentication-user-management":"# Authentication & User Management\n\n# Authentication & User Management Module\n\n## Overview\nThe Authentication & User Management module handles the complete lifecycle of a user, from initial registration and OAuth2 integration to session management, multi-step trial flows, and account status transitions (e.g., withdrawal, pause, and restart).\n\nThe system is built on a dual-database architecture:\n1.  **MGPF Database (`mgpf`)**: Stores core platform user data in the `users` table.\n2.  **Local Database (`default`)**: Stores service-specific member details in the `members` table.\n\n## Core Components\n\n### Controllers\n- **`Controller_Auth`**: The base controller for authentication. Handles login/logout, administrative login overrides, and status-based redirection (e.g., showing withdrawal info).\n- **`Controller_Auth_Start`**: Manages the \"New Flow\" for registration using Email or SMS verification codes.\n- **`Controller_Auth_Pre`**: Handles the initial \"Pre-registration\" phase where basic profile data (nickname, gender, birthday) is collected.\n- **`Controller_Auth_Trial`**: Manages the \"Trial\" state, enforcing mandatory verification steps like phone number authentication (SMS or Dial-in) before promoting a user to a full member.\n- **`Controller_Oauth2`**: Integrates with Opauth to provide social login/registration (Line, Facebook, Google, etc.).\n\n### Models\n- **`Model_User`**: Interfaces with the `mgpf.users` table. Responsible for generating unique usernames and managing platform-level credentials.\n- **`Model_Member`**: The primary entity for service-specific logic. It tracks user groups (Pre, Member, Paid, Pause, Draw, Stop), points, and profile status.\n- **`Model_AuthCode`**: Handles the generation and transmission of verification codes via Email and SMS.\n\n---\n\n## Registration Lifecycle\n\nThe registration process is designed as a multi-stage pipeline to ensure data quality and age compliance.\n\n```mermaid\ngraph TD\n    A[Start] --> B{Auth Method}\n    B -->|Social| C[OAuth2 Callback]\n    B -->|Manual| D[Pre-Register Profile]\n    C --> E[Trial State]\n    D --> E\n    E --> F{Verification}\n    F -->|SMS/Dial| G[Email Registration]\n    G --> H[Full Member Status]\n    H --> I[Photo/Profile Setup]\n```\n\n### 1. Pre-Registration (`Auth_Pre`)\nUsers provide basic identity data. \n- **Age Gate**: The system strictly enforces a minimum age (30 years) via `_validation()`.\n- **Group Transition**: Users are initially created in the `mgpf.users` table and then promoted to the `pre` group in the local `members` table via `wasPromoted2Pre()`.\n\n### 2. Trial Phase (`Auth_Trial`)\nOnce a \"Pre\" account exists, the user enters the Trial phase.\n- **Mandatory Phone Auth**: Depending on the `ad_code` or system settings, users may be forced to verify a phone number via SMS or by dialing a specific number (`action_register`).\n- **Promotion**: Upon successful verification, `wasPromoted2Normal()` is called to transition the user from `pre` to `member`.\n\n### 3. OAuth2 Integration (`Oauth2`)\nSocial registration bypasses some manual entry but enforces similar checks:\n- **Duplicate Check**: `isDuplicateOpenId` ensures a social account isn't linked to multiple local accounts.\n- **Data Mapping**: Maps provider data (e.g., Facebook `first_name`) to local fields (e.g., `nickname`).\n\n---\n\n## Authentication Mechanisms\n\n### Standard Login\nHandled via `Controller_Auth::action_login`. It checks if a session exists and redirects to the dashboard. It also clears temporary session data for email/phone numbers used during the \"Start\" flow.\n\n### Verification Code Login (`Auth_Start`)\nA modern passwordless flow:\n1.  User enters Email or Phone.\n2.  `Model_AuthCode::sendAuthCodeMail` or `sendAuthCodeSms` is triggered.\n3.  User enters the code in `action_mail_code` or `action_sms_code`.\n4.  `action_codelogin` performs a `force_login` using the verified identifier.\n\n### Administrative Login (`action_adminlogin`)\nAllows administrators to impersonate users for support purposes.\n- **Security**: Requires an encrypted data payload containing a login hash.\n- **Logging**: Every admin login is recorded in `Model_ProcessLog` and `Model_AdminLog`.\n- **Session**: Sets an `isAdmin` flag in the session to prevent the system from updating the user's \"Last Login\" timestamp during the session.\n\n---\n\n## User Status Management\n\nThe system uses the `group` field to control access and UI:\n\n| Group ID | Status | Behavior |\n| :--- | :--- | :--- |\n| `pre` | Pre-member | Redirected to Trial/Verification flows. |\n| `member` | Normal | Full access to standard features. |\n| `paid` | Paid Member | Full access + premium features. |\n| `pause` | Paused | Redirected to `action_restart_info`. Can reactivate via `action_restart`. |\n| `draw` | Withdrawn | Redirected to `action_withdraw_info`. Access blocked. |\n| `stop` | Suspended | Redirected to `action_withdraw_info`. Access blocked. |\n\n### Restarting Membership\nUsers in the `pause` group can resume activity via `Controller_Auth::action_restart`. This performs a database transaction that:\n1.  Updates the `members.group` to `member`.\n2.  Updates `users_login_checks.group`.\n3.  Clears `pause_at` and `withdrawal_at` timestamps.\n4.  Logs the transition in `Model_ProcessLog`.\n\n---\n\n## Developer Notes\n\n### Session Handling\nThe module relies heavily on the `Session` class for multi-step forms. Key keys include:\n- `member`: Array of current member data.\n- `login_type`: Distinguishes between `pc`, `sp` (smartphone web), and `app` (native).\n- `authcode`: Temporary storage for verified identifiers during the code-login flow.\n\n### Device Detection\nThe `Agent` helper is used throughout to determine the view folder and layout. Native app users are often redirected to specific \"jump\" pages (`action_loginjump`, `action_signinjump`) to trigger deep-linking back into the mobile application.\n\n### Security Patterns\n- **Validation Callables**: Uses `Helper_MyValidation` for custom rules like `check_valid_email`, `valid_cellphone`, and `ng_word`.\n- **Encryption**: Sensitive data passed via URLs or hidden inputs (like admin login data) is processed through `MyEncrypt::decrypt` and `MyEncrypt::encrypt`.","batch-tasks-cron":"# Batch Tasks & Cron\n\n# Batch Tasks & Cron Module\n\nThe **Batch Tasks & Cron** module contains the background processing logic for the application. These tasks handle high-latency operations, data aggregation, and automated maintenance routines that are executed via the FuelPHP `oil refine` command.\n\n## Core Tasks\n\n### 1. Daily Totalization (`Cron_Daily_Totalization`)\nAggregates system-wide metrics for the previous day and persists them into the `daily_totalizations` table.\n\n*   **Metrics Collected:**\n    *   User activity (Logins, Registrations, Monthly Active Users).\n    *   Financials (Point/Mile usage and acquisition).\n    *   Subscriptions (Flat rate and Premium pack counts).\n    *   Technical (Device types: iOS, Android, PC, Tablet, SP; and Mail delivery errors).\n*   **Logic Flow:**\n    1.  Initializes a data matrix for Men, Women, and Total (0).\n    2.  Fetches counts from `Model_Dailytotalization` for specific categories.\n    3.  Iterates through login data to categorize users by device type and point balance brackets (using `Common::getRealPoint`).\n    4.  Saves a record for each gender category for the target date.\n\n### 2. Member Demotion (`Cron_Demote_Member`)\nHandles the expiration of paid subscriptions.\n\n*   **Functionality:** Identifies members whose `flat_rate_pack_expire_at` or `premium_expire_at` is earlier than the current timestamp.\n*   **Execution:**\n    *   Iterates through expired `Model_MemberPayment` records.\n    *   Calls `Model_Member::wasDemotedStatus()` to revert the user's status.\n    *   Wraps each update in a database transaction to ensure data integrity.\n\n### 3. Withdrawal Cleanup (`Batch_Delete_After_Withdrawal`)\nA multi-stage cleanup process for users who have resigned from the service.\n\n*   **Stage 1: Soft Delete (30 Days):** Identifies users in the \"draw\" (withdrawn) group who resigned more than 30 days ago. It marks them as deleted and obfuscates their email address.\n*   **Stage 2: PII Removal:** For users marked as deleted, it:\n    *   Nullifies phone numbers in the central `users` table.\n    *   Deletes SMS and number logs.\n    *   Unlinks all Social Auth providers (Twitter, Facebook, Google, etc.).\n    *   **Physical Deletion:** Removes age verification images from S3 using `Common::deleteS3File`.\n\n### 4. Push Notification Dispatch (`Cron_Push`)\nProcesses scheduled push notifications (Mailmaga) from the `mailmagas` table.\n\n*   **Targeting:** Supports targeting via uploaded files (IDs/Emails) or saved search conditions.\n*   **Filtering:** Respects user preferences in `push_alert_settings` and `app_alert_settings`, including:\n    *   Global \"on/off\" toggle for mailmaga.\n    *   Day-of-week restrictions.\n    *   \"Do Not Disturb\" time windows (`from_no_receive` / `to_no_receive`).\n*   **Queueing:** Inserts pending notifications into the `push_tokens` table before calling the `Push::send()` service.\n\n### 5. Mail Magazine Processing (`Mailmaga_Proc`)\nA high-performance task designed to handle bulk email and \"In-App Message\" (Notification Box) delivery.\n\n*   **Concurrency Control:** Uses System V Semaphores (`sem_get`) and Shared Memory (`shm_attach`) to coordinate multiple processes (up to `MAX_PROC = 3`) and prevent duplicate processing.\n*   **Batching:** Processes users in chunks of 500 per process. Database inserts into `info_mail_logs` are batched (1,000 rows or 8MB) to optimize I/O.\n*   **Template Engine:** Supports both standard mailmaga content and system templates (via `Model_MailEdit`).\n\n---\n\n## Data Flow: Mailmaga & Push\n\nThe following diagram illustrates how a scheduled campaign moves from the database to the end user.\n\n```mermaid\ngraph TD\n    A[Model_Mailmaga] -->|Reserve| B(Cron_Push)\n    A -->|Reserve| C(Mailmaga_Proc)\n    B -->|Insert| D[push_tokens]\n    D -->|Execute| E[Push::send API]\n    C -->|Batch Insert| F[info_mail_logs]\n    C -->|SMTP| G[Mail::setMailBoxWithSendMail]\n    F -->|Display| H[User Notification Box]\n```\n\n---\n\n## Technical Implementation Details\n\n### Device Detection\nThe module includes a private utility `_getdevice($user_agent)` used for legacy UA parsing. It categorizes traffic into `ios`, `android`, `tablet`, `sp`, or `pc`. Modern logic in `Cron_Daily_Totalization` has largely shifted to using the `last_device` integer ID stored in the database.\n\n### Transaction Management\nTasks that modify core user status (like `Cron_Demote_Member`) utilize explicit transaction checks:\n```php\nif (!\\DB::in_transaction('default')){\n    \\DB::start_transaction('default');\n    $_begin_trans = true;\n}\n```\nThis pattern ensures that the task does not interfere with existing transactions if called internally, while providing safety for standalone execution.\n\n### Command Line Usage\nTasks are executed via the FuelPHP `oil` utility:\n\n```bash\n# Run daily totalization\nphp oil refine cron_daily_totalization\n\n# Run withdrawal cleanup (Dry Run)\nphp oil refine batch_delete_after_withdrawal dry_run\n\n# Run mailmaga processing (Requires Shared Memory IDs)\nphp oil refine mailmaga_proc [shm_id] [var_id]\n```\n\n## Error Handling\n*   **Logging:** Most tasks log start/end times and specific errors to `Fuel\\Core\\Log`.\n*   **Exception Mail:** Critical failures in `Cron_Push` trigger `Common::makeExceptionMailLog`, which alerts administrators via email.\n*   **State Management:** `Mailmaga` and `Push` tasks update status columns (`push_state`, `state`) to `ERROR` (5) upon failure to prevent infinite retry loops.","core-framework-utilities-fuel":"# Core Framework & Utilities — fuel\n\n# Core Framework & Utilities — fuel\n\nThe `fuel` module provides the foundational utility layer for the application. It extends the FuelPHP core to handle multi-device detection, complex image processing (local and S3), cryptographic operations, and global application constants.\n\n## Key Components\n\n### 1. Common Utility (`Common` class)\nThe `Common` class is a centralized hub for business logic utilities that do not belong to a specific model.\n\n*   **Image Processing & Uploads:**\n    *   `fileUpload` / `fileUploadMulti`: Handles local file uploads using the FuelPHP `Upload` class. It automatically organizes files into directories (1,000 items per folder) and triggers thumbnail generation.\n    *   `createThumbnailByPathAndFileAndType`: A robust engine for generating multiple thumbnail sizes and applying Gaussian blurs for \"mosaic\" versions of photos.\n    *   `cropFromCenterToRatioAndResize`: Ensures images from various mobile devices are normalized to specific aspect ratios and dimensions using GD or Imagick.\n    *   `changeOrientation`: Corrects JPEG EXIF orientation issues before storage.\n*   **AWS Integration:**\n    *   `uploadS3Storage` / `downloadS3Storage`: Interfaces with AWS S3 for persistent storage of profile photos, age verification documents, and static HTML.\n    *   `getSigunatureUrl`: Generates CloudFront signed URLs for secure, time-limited access to private S3 assets.\n    *   `cfInvalidation`: Triggers CloudFront cache invalidation.\n*   **Business Logic:**\n    *   `getAge` / `getBirthdayRange`: Logic for age calculation and date-of-birth range filtering.\n    *   `getDisplayPoint` / `getRealPoint`: Converts internal system points to user-facing points based on a configurable `pointrate`.\n    *   `applySegment`: A template-parsing utility that removes or keeps text blocks based on user attributes (sex, device type) using tags like `[sex1]...[/sex1]`.\n\n### 2. Device & Agent Detection (`Agent` class)\nExtends `Fuel\\Core\\Agent` to provide granular detection of mobile environments, specifically distinguishing between mobile browsers and the native wrapper.\n\n*   **Detection Methods:**\n    *   `is_native_app()`: Detects if the request originates from the iOS/Android native app (checks for `angeapp` or `mastersnsapp` in User Agent).\n    *   `is_smartphone()` / `is_tablet()`: Distinguishes between small-screen mobile devices and tablets (iPad/Android Tablet).\n    *   `get_device_view_type()`: Returns the suffix used for Smarty templates (`pc`, `sp`, `app`, or `mb`).\n*   **Template Routing:**\n    *   `get_template()`: Implements a hierarchical lookup for view files:\n        1.  **Preview:** `views/preview/...` (if `is_preview_mode` is active)\n        2.  **Custom:** `views/custom/...` (CMS-uploaded overrides)\n        3.  **Default:** `views/default/...` (System standard)\n\n### 3. Global Constants (`Consts` class)\nA massive registry of application-wide integers and strings.\n\n*   **Pagination Limits:** Defines standard fetch sizes for search results (`LIMIT_PROFILELIST`), messages, and community members.\n*   **API Response Codes:** Standardizes success (`0`) and error states (e.g., `9` for point shortage, `17` for blocked).\n*   **Cache Identities:** Defines unique prefixes for Redis/Cache keys (e.g., `CASHID_API_FOOTSTAMP_LIST`).\n*   **Member Status:** Maps database integers to logical states like `MEM_STATUS_PREMIUM` or `MEM_STATUS_PAUSE`.\n\n### 4. Cryptography (`MyEncrypt` & `AESMethod`)\nHandles data security for sensitive identifiers and external communication.\n\n*   **MyEncrypt:** Uses Blowfish encryption (ECB mode) to obfuscate member IDs in URLs and HTML. It supports `base64_url_safe` encoding to ensure encrypted strings do not break URL routing.\n*   **AESMethod:** Provides AES-128-ECB decryption, primarily used for specific secure data exchanges defined in configuration.\n\n---\n\n## Execution Flow: Image Upload & Storage\n\nThe following diagram illustrates the flow when a user uploads a profile photo.\n\n```mermaid\ngraph TD\n    A[Controller] --> B[Common::fileUpload]\n    B --> C{Upload::is_valid}\n    C -- Yes --> D[Common::changeOrientation]\n    D --> E[Common::createThumbnail]\n    E --> F[Common::cropImage]\n    F --> G[Common::uploadS3Storage]\n    G --> H[S3 Bucket: Photos]\n    E --> I[Local Thumbnail Copy]\n    B --> J[Model_AdjustLog::setevent]\n    C -- No --> K[Return Error Code]\n```\n\n---\n\n## Developer Usage Patterns\n\n### Handling Points\nAlways use the utility methods to ensure point calculations remain consistent if the exchange rate changes in `Model_Param`.\n```php\n// Displaying points to user\n$display = Common::getDisplayPoint($internal_value);\n\n// Converting user input back to system value\n$real = Common::getRealPoint($input_value);\n```\n\n### Device-Specific Logic\nUse the `Agent` class to toggle features or layouts.\n```php\nif (Agent::is_native_app()) {\n    // Logic specific to the iOS/Android WebView wrapper\n}\n\n// Load a template automatically suffixed with _pc, _sp, or _app\n$view = View::forge(Agent::get_template('profile/index'));\n```\n\n### Logging Administrative Actions\nWhen performing sensitive operations in the backend, use `writeLog` to maintain an audit trail.\n```php\nCommon::writeLog([\n    'log_type' => '操作',\n    'place'    => '会員編集',\n    'note'     => '会員ID: 123 のステータスを停止に変更'\n]);\n```\n\n### Temporary Data Storage\nFor caching large datasets or session-related settings that shouldn't persist in the main DB, use the Redis-backed `saveTempfile`.\n```php\nCommon::saveTempfile(Consts::CASHID_API_SEARCH_SETTING, $member_id, $search_params);\n```","core-framework-utilities-resources":"# Core Framework & Utilities — resources\n\n# Core Framework & Utilities — Resources\n\nThe `resources` module provides a foundational set of TypeScript utilities for the application. It handles three primary concerns: surrogate-pair aware string manipulation, DOM-based text truncation (ellipsis), and environment detection (User Agent and Browser capabilities).\n\n## String & Text Utilities (`common.ts`)\n\nStandard JavaScript string methods (like `.length` and `.substr`) treat surrogate pairs (emojis, specific symbols) as two separate characters. This module provides replacements to ensure accurate text processing.\n\n### Surrogate-Pair Aware Functions\n*   **`count(text: string): number`**: Returns the actual character count of a string, correctly identifying emojis, Fitzpatrick skin type modifiers, regional indicator symbols (flags), and Zero Width Joiners (ZWJ).\n*   **`substr(text: string, start: number, length: number): string`**: A surrogate-aware substring implementation. It prevents \"breaking\" a multi-byte character by checking for variation selectors and surrogate pairs before slicing.\n\n### Formatting & Security\n*   **`escapeHtml(text: string)` / `unescapeHtml(text: string)`**: Sanitizes strings for safe injection into the DOM or reverses the process.\n*   **`nl2br(text: string)`**: Converts newline characters (`\\n`) into HTML `<br>` tags.\n*   **`format(text: string, ...args: string[])`**: Simple template engine replacing `{0}`, `{1}`, etc., with provided arguments.\n*   **`zeroPadding(text: string, length: number)`**: Pads a string with leading zeros.\n\n## UI & Layout Utilities\n\n### Text Truncation (Ellipsis)\nThe module provides two ways to truncate text that exceeds its container's height.\n\n1.  **`ellipsis(target, text)`**: \n    *   Uses a **binary search algorithm** (`searchElementFitHeightRange`) to find the maximum number of characters that fit within the `offsetHeight` of the target element.\n    *   Appends `...` to the result.\n    *   Best for single-line or fixed-height containers.\n2.  **`ellipsisMultiline(target, text)`**: \n    *   Creates a hidden clone of the element to calculate layout without flickering.\n    *   Iteratively removes characters from the end until the clone's height matches the target's original height.\n    *   Supports HTML line breaks via `nl2br`.\n\n### Browser & Environment Helpers\n*   **`timeout(ms: number)`**: A Promisified `setTimeout` for use with `async/await` patterns.\n*   **`isPassedViewTime(accessTime: number)`**: Compares a Unix timestamp against the current time to prevent re-triggering UI events (like toasts) on browser back/forward navigation.\n*   **`setHeaderNavi(pagename: string)`**: Manages a comma-separated list of visited pages in a `headerNavi` cookie, used for tracking navigation state.\n\n## Environment Detection\n\n### UserAgentInfo (`user_agent_info.ts`)\nA class-based wrapper for parsing `navigator.userAgent`. It provides boolean flags and versioning for specific environments.\n\n| Method | Description |\n| :--- | :--- |\n| `is_ios()` | Detects iPhone, iPod, or iPad. |\n| `is_android()` | Detects Android devices. |\n| `get_os_version()` | Returns a 4-digit integer (e.g., `1400` for iOS 14). |\n| `is_chrome()` | Detects Chrome, excluding specific wrappers like Yahoo App. |\n| `is_ie()` | Detects Internet Explorer (via `msie` or `trident` tokens). |\n| `is_facebook()` | Detects if the app is running inside the Facebook in-app browser. |\n\n### Animation & Browser Polyfills (`browser_helper.ts`)\nThis file executes an IIFE (Immediately Invoked Function Expression) to polyfill `requestAnimationFrame` and `cancelAnimationFrame` for older browsers (IE9, legacy Webkit/Mozilla).\n\n*   **`AnimationBrowserHelper.getIEVersion()`**: Specifically targets IE 10 and older by parsing the `MSIE` token in the User Agent. Returns `null` for modern browsers (Edge/Chrome) or IE 11+.\n\n## Execution Flow: Binary Search Ellipsis\n\nThe `ellipsis` function uses a recursive binary search to efficiently calculate text fit, minimizing DOM reflows compared to character-by-character truncation.\n\n```mermaid\ngraph TD\n    A[Start ellipsis] --> B{Text fits?}\n    B -- Yes --> C[Set innerText]\n    B -- No --> D[searchElementFitHeightRange]\n    D --> E[Calculate Midpoint]\n    E --> F{Height > Max?}\n    F -- Too Long --> G[Search Left Half]\n    F -- Fits --> H[Search Right Half]\n    G --> D\n    H --> D\n    D -- Range Converged --> I[Apply final substr + ...]\n```\n\n## Integration Patterns\n\n*   **Vue.js Integration**: Used in `inserted` hooks (e.g., `community/index.js`) to handle text clamping on dynamic content.\n*   **Navigation Tracking**: `setHeaderNavi` is called across various index and list controllers (`tweet/history.ts`, `community/list.ts`) to maintain breadcrumb or navigation state in cookies.\n*   **Safety**: `escapeHtml` is utilized during Vue initialization in `tweet/list.ts` to ensure user-generated content is sanitized before rendering.","core-framework-utilities":"# Core Framework & Utilities\n\n# Core Framework & Utilities\n\nThe Core Framework & Utilities module serves as the foundational backbone of the application, bridging server-side PHP logic with client-side TypeScript utilities. It provides a unified interface for device detection, media management, and data integrity across the entire stack.\n\n## Module Overview\n\nThis module is divided into two primary sub-modules that synchronize environment handling and data processing:\n\n*   **[Fuel Framework Extensions](fuel.md)**: Extends the FuelPHP core to handle server-side business logic, including multi-device routing, S3-integrated image processing, and cryptographic operations.\n*   **[Resources & TypeScript Utilities](resources.md)**: Provides client-side parity for environment detection and advanced string manipulation, specifically focusing on surrogate-pair (emoji) awareness and DOM utilities.\n\n## Integrated Workflows\n\nThe sub-modules work together to ensure a consistent user experience and data integrity through the following cross-functional workflows:\n\n### 1. Environment-Aware Rendering\nThe system uses a dual-layer approach to device detection. The `Agent` class in the **Fuel** module determines the server-side template path (via `get_template` and `get_incfilepath`), while the **Resources** module provides real-time browser and OS detection (e.g., `is_android`) to adjust UI behavior and text truncation logic on the client side.\n\n### 2. Data Integrity & Emoji Handling\nTo prevent data corruption in databases that may have specific character encoding limits, both modules provide tools for surrogate-pair awareness.\n*   **Client-side**: `common.ts` uses `count()` to accurately measure string lengths containing emojis.\n*   **Server-side**: `Validation` and `ConvertEmoji` classes use `_getSurrogateCount` and `_convertCodePoints` to sanitize and validate input before persistence.\n\n### 3. Media & Asset Management\nThe **Fuel** module's `Common` class acts as the primary engine for file lifecycles. It orchestrates local and remote (S3) storage, utilizing automated directory sharding (1,000 items per folder) and triggering thumbnail generation via `createThumbnailByPathAndFileAndType`.\n\n## System Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Resources (TypeScript)\"\n        UA[User Agent Detection]\n        STR[Surrogate-Pair Aware Strings]\n        DOM[DOM Truncation/Ellipsis]\n    end\n\n    subgraph \"Fuel (PHP)\"\n        AG[Agent: Device/Carrier Routing]\n        CM[Common: Image & S3 Processing]\n        CE[ConvertEmoji: Character Mapping]\n        MY[MyORM: Query Building]\n    end\n\n    UA -.->|Parity| AG\n    STR -.->|Validation Logic| CE\n    CM -->|Storage| S3[(AWS S3 / Local)]\n    AG -->|Template Selection| View[UI Views]\n```\n\n## Key Cross-Module Components\n\n| Component | Responsibility | Interaction |\n| :--- | :--- | :--- |\n| **Device Detection** | Identifying OS, Browser, and Carrier. | `Agent.php` (Server) + `common.ts` (Client) |\n| **Text Processing** | Handling multi-byte and surrogate characters. | `convertemoji.php` + `resources/common.ts` |\n| **File Management** | Uploading, resizing, and deleting assets. | `Common.php` utilizing FuelPHP Upload core. |\n| **Data Access** | Fluent interface for database interactions. | `MyORM` extensions for complex query building. |","email-notifications":"# Email & Notifications\n\n# Email & Notifications Module\n\nThe **Email & Notifications** module is a centralized communication engine responsible for delivering transactional emails, system alerts, push notifications, and SMS messages. It integrates template management, user preference filtering, and multi-channel delivery (Email, App Push, and In-App Mailbox).\n\n## Core Components\n\n### 1. Mail Class (`Mail`)\nThe primary entry point for sending communications. It handles the logic of determining *who* gets *what* message through *which* channel.\n\n- **`setMailBoxWithSendMail()`**: The main dispatcher. It accepts a \"Content ID\" (e.g., `MAIL_MESSAGE_NOTICE`), resolves the template, checks user notification settings, and triggers delivery across Email, Push, and the internal Mailbox.\n- **`getSettingTable()`**: A configuration map that links Content IDs to specific templates, sender addresses, and notification types (Push/App/Email).\n- **`sendEmail()` / `sendEmailHtml()`**: Low-level wrappers for the FuelPHP Email driver, handling SMTP headers and mobile-specific formatting (e.g., AU/EZWeb optimizations).\n\n### 2. Push Class (`Push`)\nHandles mobile push notifications via Amazon SNS.\n\n- **`send()`**: A batch processing method used by cron jobs to send queued notifications. It uses shared memory (`shm_attach`) and semaphores to manage parallel processing across multiple shell processes.\n- **`sendEachTime()`**: Used for real-time notifications. It calculates iOS badge counts dynamically based on the user's unread message/nice/info status.\n- **`setErrFlg()`**: Maintenance method that invalidates device tokens when Amazon SNS returns a delivery failure.\n\n### 3. Sms Class (`Sms`)\nA specialized class for phone number verification.\n- Generates 6-digit verification codes.\n- Interfaces with `Model_AuthCode::sendSmsLink` to trigger external SMS gateways.\n- Validates codes and updates the member's verified telephone status.\n\n### 4. Model_MailEdit\nThe template engine for the module. It manages the `mail_edits` table, which stores:\n- **Title/Body**: For standard emails.\n- **Title/Body Mailbox**: For the internal app notification center.\n- **Content Push**: Short-form text for mobile lock screens.\n\n## Notification Flow\n\nThe following diagram illustrates how a single call to the module propagates across different channels:\n\n```mermaid\ngraph TD\n    A[Trigger: setMailBoxWithSendMail] --> B{Get Settings Table}\n    B --> C[Resolve Template: Model_MailEdit]\n    C --> D[Tag Replacement: Nickname, URLs, etc.]\n    D --> E{Check User Settings}\n    E -->|Email Enabled| F[Mail::sendEmail]\n    E -->|Push Enabled| G[PushAocca::sendEachTime]\n    E -->|App Alert Enabled| H[InMsg::publishMsg]\n    D --> I[Insert into InfoMailBox Log]\n```\n\n## Template Tag System\n\nTemplates in `Model_MailEdit` use a robust tag replacement system to personalize content:\n\n| Tag Category | Examples | Description |\n| :--- | :--- | :--- |\n| **System URLs** | `_TOPAPP_`, `_MSGLIST_` | Automatically generates deep links for web or app schemes. |\n| **User Data** | `_USERNAME_`, `_USERPT_` | Injects recipient's nickname or point balance. |\n| **Partner Data** | `_PARTNERNICKNAME_` | Used in action emails (e.g., \"X liked your photo\"). |\n| **Segment Tags** | `[sex1]...[/sex1]` | Conditional content visibility based on gender or device type. |\n\n## Key Constants & Configurations\n\n### Target Channels\n- `TARGET_MAIN` (1): Primary email address.\n- `TARGET_SUB1/2` (2, 3): Secondary/Mobile addresses.\n- `TARGET_ALL` (9): All registered addresses.\n\n### Content IDs\nThe module distinguishes between three ranges of IDs:\n1. **Action Mails (1-99)**: Triggered by user interactions (Likes, Comments, Follows).\n2. **System Mails (100-199)**: Triggered by administrative actions (Age verification, Payment confirmation).\n3. **Inquiry/Manual (200+)**: Customer support replies and manual newsletters.\n\n## Developer Integration Guide\n\n### Sending a Transactional Notification\nTo send a notification, identify the appropriate constant in `Mail` and provide the member objects.\n\n```php\n// Example: Sending a message notice\nMail::setMailBoxWithSendMail(\n    Mail::MAIL_MESSAGE_NOTICE, \n    $sender_member_obj, \n    $recipient_member_id, \n    ['custom_tag' => 'value']\n);\n```\n\n### Adding a New Notification Type\n1. Add a new `const MAIL_NEW_TYPE` in `classes/mail.php`.\n2. Define its mapping in `getSettingTable()`, specifying the `template` ID from the `mail_edits` table.\n3. If push is required, add the mapping to `Push::$push_type`.\n4. Create the corresponding record in the `mail_edits` database table.\n\n### Handling Delivery Failures\nThe module automatically tracks delivery errors via `insertSendMail()`. If a device token becomes invalid, `Push::setErrFlg()` is called to nullify the `endpoint_arn` in the `device_tokens` table, preventing further wasted API calls to SNS.","external-integrations":"# External Integrations\n\n# External Integrations Module\n\nThe External Integrations module provides a unified interface for interacting with third-party platforms, including social media (Apple, Facebook, LINE, Instagram, Twitter), mobile marketing (Adjust), push notifications (Amazon SNS), and affiliate networks.\n\n## Core Components\n\n### 1. Authentication & Identity Providers\n\n#### Apple API (`AppleApi`)\nHandles \"Sign in with Apple\" server-side validation and token management.\n- **JWT Generation**: Uses `generateJWT` to create client secrets signed with ES256 using private keys stored in the application path.\n- **Token Management**: `get_acess_token` exchanges authorization codes for access tokens.\n- **Revocation**: `apple_revoke` allows the application to invalidate refresh tokens when a user withdraws from the service.\n\n#### LINE (`Line`)\nManages LINE Login and profile synchronization.\n- **Verification**: `verifyAccessToken` and `verifyIdToken` validate tokens against LINE's OAuth2 servers.\n- **Profile Sync**: `getUserinfo` retrieves user metadata, and `saveProfilePicture` downloads and stores the user's LINE avatar locally.\n\n#### Facebook (`Facebook2` & `Facebook`)\nThe system maintains two Facebook implementations:\n- `Facebook2`: A utility class for fetching user data (friends, albums, photos) and saving profile pictures using the Facebook PHP SDK.\n- `Facebook` (Model Extension): Integrated with the `SnsCooperation` system for long-term account linking and automated feed synchronization.\n\n### 2. SNS Cooperation System\nThe `Model_SnsCooperation` base class and its children (`Twitter`, `Instagram`, `Facebook`) manage persistent links between local member accounts and external social profiles.\n\n```mermaid\ngraph TD\n    Member[Model_Member] --> Coop[Model_SnsCooperation]\n    Coop --> TW[Twitter Class]\n    Coop --> IG[Instagram Class]\n    Coop --> FB[Facebook Class]\n    TW --> Auth[TwitterOAuth]\n    IG --> InstAPI[Instagram-PHP-API]\n    FB --> FBSDK[Facebook-PHP-SDK]\n```\n\n- **Real-time Sync**: `Instagram::createPhotoAndTweet` handles incoming webhooks to automatically import Instagram posts as local \"Tweets.\"\n- **Batch Processing**: `getTargetPeriodFeedAndTweet` (Facebook) and `getMyTimeLine` (Twitter) support \"Matome\" (summary) features, typically triggered by cron tasks to aggregate social activity.\n- **Media Handling**: Classes include private `_createPhoto` methods to download remote images, generate thumbnails via `Common::createThumbnail`, and register them in `Model_Photo`.\n\n### 3. Mobile Push Notifications (`Sns`)\nWraps the AWS SDK to manage mobile push notifications via Amazon SNS (FCM v1).\n\n- **Endpoint Management**: `getEndpointArn` registers device tokens with AWS; `deleteEndpointArn` removes them.\n- **High-Volume Dispatch**: \n    - Single recipients use `sendToEndpoint`.\n    - Multiple recipients use `sendToTopic`, which dynamically creates a temporary SNS Topic, subscribes users in parallel (using `CommandPool`), publishes the message, and then cleans up the topic.\n- **Payload Construction**: `buildMessage` formats data for both iOS (APNS) and Android (FCM), including custom metadata like badge counts and deep-link targets.\n\n### 4. Marketing & Attribution\n\n#### Adjust Integration (`Model_AdjustLog`)\nTracks user lifecycle events for mobile attribution.\n- **Event Tracking**: `setevent` records significant actions (registration, age verification, purchases). It enforces \"one-time\" logic for specific events like `REGISTER_MALE_ETOKEN`.\n- **Callback Handling**: `updatebycallback` processes incoming pings from Adjust to link internal `members_id` with Adjust's `adid` and `tracker` information.\n- **App Synchronization**: `getEventToken` retrieves pending events to be sent to the mobile client for client-side tracking.\n\n#### Affiliate System (`Affiliate`)\nManages conversion reporting for multiple affiliate networks (A8, AffiliateB, Rentracks, AccessTrade).\n- **Conversion Logic**: `send($members_id)` identifies the affiliate type from the member's profile and dispatches a GET request to the respective provider's tracking URL.\n- **Error Logging**: Failed pings are recorded in `Model_FailedAffiliateLog` via the `connect` method for manual reconciliation.\n\n## Configuration\nMost classes depend on specific configuration files located in `fuel/app/config/`:\n- `apple_login.php`: Team IDs, Key IDs, and `.p8` file paths.\n- `opauth.php`: API keys and secrets for Facebook, Twitter, and LINE.\n- `aws_sns.php`: Platform Application ARNs.\n- `adjust.php`: Event tokens mapped by OS.\n\n## Usage Patterns\n\n### Social Media Posting\nTo post a message to a user's linked Twitter account:\n```php\n$twitter = new Twitter(['members_id' => $user_id]);\nif ($twitter->isCooperation()) {\n    $twitter->post(\"Hello from the app!\", $optional_photo_id);\n}\n```\n\n### Triggering Attribution\nTo record a successful purchase for Adjust:\n```php\nModel_AdjustLog::setevent($user_id, Model_AdjustLog::POINT_ETOKEN, $price, $order_id);\n```\n\n### Sending Push Notifications\n```php\nSns::send([\n    'endpoint_arn_array' => [$arn],\n    'alert' => 'You have a new message!',\n    'badge' => 1,\n    'to' => 'messages/view'\n]);\n```","media-handling":"# Media Handling\n\n# Media Handling Module\n\nThe Media Handling module manages the lifecycle of user-generated visual content, including photos and videos. It handles secure storage (S3 and local), administrative review workflows, content privacy, and dynamic image processing (thumbnails and watermarking/mosaics).\n\n## Core Components\n\n### 1. Photo Management (`Controller_Photo` & `Model_Photo`)\nThe photo system distinguishes between several content types defined in `Model_Photo`:\n*   `CONTENT_PROFILE`: Primary user profile pictures.\n*   `CONTENT_SUB`: \"Appeal\" or gallery photos.\n*   `CONTENT_MESSAGE`: Photos attached to private messages.\n*   `CONTENT_TWEET`: Photos used in social feed posts.\n\n#### Privacy and Visibility\nVisibility is determined by a combination of the `check` status (administrative approval) and `album_flg`.\n*   **Check Statuses**: `CHECK_OFF` (Pending), `CHECK_ON` (Approved), `CHECK_NG` (Rejected).\n*   **Rollback Logic**: When a new photo is uploaded, the system uses `setPhotoRollback` to manage versioning. If a new photo is pending or rejected, the system can automatically revert to displaying the last \"Approved\" photo for that user.\n\n### 2. Video Management (`Controller_Video`, `Model_Video`, & `Video`)\nVideos undergo an asynchronous conversion process to ensure cross-device compatibility.\n*   **Upload**: Files are initially stored in a temporary directory.\n*   **Conversion**: The `Video::convert()` method interfaces with the **CloudConvert API** to transcode various formats into optimized MP4s and generate PNG thumbnails.\n*   **Streaming**: `Video::play()` implements partial content streaming (`HTTP 206`) to allow seeking within the video player.\n\n---\n\n## Key Workflows\n\n### Image Retrieval Flow\nImages are rarely accessed directly via static URLs. Instead, they are served through controller actions that verify permissions and encryption.\n\n```mermaid\ngraph TD\n    A[Request Image] --> B{Is App or Web?}\n    B -- Web --> C[Controller_Photo::action_photoGet]\n    B -- App --> D[Controller_Photo::action_photoGetApp]\n    C --> E[MyEncrypt::decrypt ID]\n    E --> F{Check Mode}\n    F -- PHOTO_OKSTATUS --> G[Show only if Approved]\n    F -- PHOTO_MINE --> H[Show if not Rejected]\n    G --> I[Common::downloadS3Storage]\n    I --> J[Output Binary Stream]\n```\n\n### Administrative Review (`setProfileimagecheck`)\nWhen an administrator approves or rejects media, the following side effects occur:\n1.  **Point Allocation**: Users may receive bonus points for their first approved profile or appeal photo (`Model_BonusPoint`).\n2.  **Penalty Tracking**: Rejections (`CHECK_NG`) increment the user's `ng_cnt` in `member_details`.\n3.  **Notifications**: Automated emails are dispatched via `Mail::setMailBoxWithSendMail` based on the result.\n4.  **Log Generation**: Entries are created in `Model_ProcessLog` and `Model_AdminLog`.\n\n---\n\n## Technical Reference\n\n### Encryption and Security\nMost media IDs passed in URLs are encrypted using `MyEncrypt::encrypt()`. Controllers like `Controller_Photo` decrypt these IDs before querying the database to prevent ID enumeration attacks.\n\n### S3 Integration\nThe module uses `Common::downloadS3Storage` to fetch assets. \n*   **Photos**: Stored in `Consts::S3BUCKET_PHOTOS`.\n*   **Age Verification**: Stored in `Consts::S3BUCKET_AGE` with stricter referrer checks in `action_ageverifyGet`.\n\n### Thumbnail Conventions\nThe system generates and expects specific suffixes for different UI requirements:\n*   `_thumbnail1.jpg`: Small square (List views).\n*   `_thumbnail2.jpg`: Medium (Profile view).\n*   `_thumbnail3.jpg`: Large (Expanded view).\n*   `_mosaic1.jpg` / `_mosaic2.jpg`: Blurred versions for restricted content.\n\n### Video Conversion States\n| Status | Constant | Description |\n| :--- | :--- | :--- |\n| 0 | `STATUS_OFF` | Uploaded, waiting for cron to pick up. |\n| 1 | `STATUS_EXE` | Currently being processed by CloudConvert. |\n| 2 | `STATUS_ON` | Conversion successful; available for playback. |\n| 3 | `STATUS_NG` | Conversion failed. |\n\n## Developer Notes\n*   **Performance**: The `before()` method in `Controller_Photo` skips standard front-end initialization for image-get actions to reduce CPU overhead.\n*   **Transaction Safety**: Media status updates, especially those involving point transfers or log entries, are wrapped in `DB::start_transaction()`.\n*   **Physical Deletion**: The `deleteContent($path)` method handles the removal of the base image and all associated thumbnails/mosaics from the local filesystem.","messaging-communication-fuel":"# Messaging & Communication — fuel\n\n# Messaging & Communication — Fuel Module\n\nThe Messaging & Communication module handles all direct interactions between users, including private messaging, matching notifications, system announcements, and inquiry management. It serves as the core engine for user engagement within the SNS platform.\n\n## Core Components\n\n### 1. Controllers\n*   **`Controller_Message`**: The primary interface for 1-on-1 chat. It manages message history, real-time message polling (via JSON), and message transmission.\n*   **`Controller_Msglist`**: Manages the \"Inbox\" or \"Matching List\" views. It handles the high-level categorization of conversations (Matching vs. General Messages) and sorting logic.\n*   **`Controller_Mailbox`**: Handles non-user-to-user communication, specifically system notifications (`infomail`), site news, and support ticket replies (`inquiry`).\n\n### 2. Models\n*   **`Model_MessageLog`**: The data layer for individual message records. It includes complex logic for \"1st Approach\" (initial messages), read status tracking, and administrative moderation (NG word filtering).\n*   **`Model_MessagePool`**: Manages the \"Room\" or \"Conversation\" state. It aggregates message data to provide a summary view for the message list, handling caching and pagination for performance.\n\n---\n\n## Message Flow Architecture\n\nThe following diagram illustrates the execution flow when a user sends a message through `action_publish`.\n\n```mermaid\ngraph TD\n    A[Controller_Message::action_publish] --> B{Validate Input}\n    B -->|Valid| C[msgsend Internal Method]\n    C --> D[Model_NgWord::ngWordValidation]\n    D -->|Pass| E[Insert message_logs]\n    E --> F[Update message_pools]\n    F --> G[Insert process_logs]\n    G --> H[unreadmsg Internal Method]\n    H --> I[Return JSON Response]\n    D -->|Fail| J[Return Error JSON]\n```\n\n---\n\n## Key Functional Areas\n\n### 1. The 1-on-1 Chat Interface (`Controller_Message`)\nThe chat system supports several specialized message types and states:\n*   **Penalty Checks**: Before loading a chat, `Tag::isMemberPenalty` is checked to restrict access for penalized users.\n*   **1st Approach Logic**: The system distinguishes between the first message sent and subsequent replies. `Model_MessageLog::checkFirstApp` tracks if a message is under administrative review.\n*   **Message Types (`place`)**:\n    *   `PLACE_MESSAGE` (0): Standard chat.\n    *   `PLACE_QUESTION` (1) / `PLACE_ANSWER` (2): Specific Q&A interactions.\n    *   `PLACE_NICE` (5): Messages attached to \"Likes\".\n*   **Polling & Updates**: `action_prepend` and `action_tickread` provide the backend for AJAX-based message updates, allowing the UI to fetch new messages without a full page reload.\n\n### 2. Inbox Management (`Controller_Msglist`)\nThe inbox categorizes interactions into two main tabs:\n*   **Matching**: Users who have mutually liked each other.\n*   **Messages**: Active conversation threads.\n\nIt utilizes `Model_MessagePool::getNicesMatchingLists` to fetch a combined view of users and their latest message snippets. The list state (sort order, active tab) is persisted via `Common::saveTempfile` to maintain user context across sessions.\n\n### 3. System & Support Communication (`Controller_Mailbox`)\nThis controller manages the \"Information\" section of the app:\n*   **Infomail**: Automated notifications (e.g., \"Someone liked your photo\").\n*   **News**: Global site announcements.\n*   **Inquiry**: A threaded support system where users can view their sent inquiries and staff replies.\n\n---\n\n## Security & Moderation\n\n### Encryption\nThe module heavily relies on `MyEncrypt` to obfuscate internal IDs in URLs and JSON payloads.\n*   `message_key`: Usually a comma-separated string of `(my_id, partner_id)` encrypted to prevent ID enumeration.\n*   `api_partner_id`: Encrypted version of the recipient's ID used for API calls.\n\n### Content Filtering\nAll outgoing messages pass through `Model_NgWord::ngWordValidation`. \n*   If a message contains prohibited terms, it is either blocked or automatically replaced with asterisks via `setGuardWordReplaceAsterisk`.\n*   Administrative status (`CHECK_NG`, `CHECK_FNG`) allows moderators to hide messages from the UI while retaining them in the database.\n\n### Access Control\nThe module enforces strict visibility rules:\n*   **Blocking**: `Model_Block::isMeBlocked` and `isPartnerBlocked` prevent message delivery and UI rendering if a block relationship exists.\n*   **Age Verification**: Many features (like sending custom templates or viewing certain photos) are gated behind `member->isAdult()` and `member->age_check`.\n\n---\n\n## Implementation Details\n\n### Message Sending (`msgsend`)\nThe `msgsend` method in `Controller_Message` is a multi-step transaction:\n1.  Verifies that neither user has blocked the other.\n2.  Validates the message body against NG words.\n3.  Determines the `place` (context) of the message.\n4.  Inserts into `message_logs`.\n5.  Updates the `updated_at` timestamp in `message_pools` to \"bump\" the conversation to the top of the inbox.\n6.  Logs the action in `process_logs` for auditing.\n\n### Read Status Tracking\nRead status is updated via `Model_MessageLog::setReadat`. To optimize performance, it performs a bulk update on unread messages from a specific partner when the user opens the chat room, excluding messages that are still pending image moderation.","messaging-communication-resources":"# Messaging & Communication — resources\n\n# Messaging & Communication — Resources\n\nThe Messaging module provides a real-time chat interface using Socket.io and Vue.js. It handles bidirectional communication, message history, read receipts, image uploads, and complex business logic regarding user age verification and point-based feature access.\n\n## Core Components\n\n### 1. MessageClient (`socketclient.ts`)\nA wrapper around `socket.io-client` that manages the WebSocket connection and provides an Observable-based interface for event handling.\n\n*   **Connection Management**: Handles initial connection, manual reconnection, and listener cleanup.\n*   **Event Emission**: Provides typed methods for specific socket actions:\n    *   `connect(connectkey)`: Authenticates the session.\n    *   `publish(senddata)`: Sends a standard text message.\n    *   `publishTemplate(...)`: Sends a message using a predefined template.\n    *   `publishimg(senddata)`: Sends an image message (after upload).\n    *   `readMessage(senddata)`: Notifies the server that a specific message has been viewed.\n    *   `prepend(senddata)`: Requests historical messages (pagination).\n*   **Reactive Listening**: The `on(socketEvent)` method returns an RxJS `Observable`, allowing the main application to subscribe to incoming data streams (e.g., `putmsg`, `publish`, `chgread`).\n\n### 2. Message Controller (`index.ts`)\nThe central orchestrator that initializes the UI, manages state, and bridges the Socket client with the Vue components.\n\n*   **State Tracking**: Manages message IDs for pagination (`gstartmsgid`, `lastmsgid`), read status arrays (`markMsgIdRead`), and partner status (blocked, hidden, or retired).\n*   **Socket Integration**: Subscribes to `MessageClient` events within the `setOn()` method to update the UI in real-time when messages are received or read statuses change.\n*   **Business Logic**: Enforces restrictions based on `age_check` status and point balances.\n\n## Execution Flow: Message Lifecycle\n\n```mermaid\ngraph TD\n    A[User Inputs Text] --> B{Check Restrictions}\n    B -- Age/Points Restricted --> C[Show RestrictMessageDialog]\n    B -- Allowed --> D[MessageClient.publish]\n    D --> E[Socket.io Server]\n    E --> F[Event: publish]\n    F --> G[Message.viewmessage]\n    G --> H[Update Vue msgitems]\n    H --> I[Scroll to Bottom]\n```\n\n## Key UI Sub-Modules (Vue Instances)\n\nThe module divides the chat interface into several specialized Vue instances:\n\n| Instance | Responsibility |\n| :--- | :--- |\n| `headerVue` | Displays partner info, online status, and the \"Read Receipt\" toggle. |\n| `messageVue` | Manages the message list, iScroll integration, and message rendering (text vs. image vs. system alerts). |\n| `footerVue` | Handles the input area, auto-expanding textareas, and file upload triggers. |\n| `messagePreviewDialog` | Full-screen image viewer that fetches high-res CloudFront URLs via API. |\n| `errorDialog` | Centralized error reporting for socket failures or business logic rejections. |\n\n## Feature Implementation Details\n\n### Read Receipts\nThe system tracks read status through a combination of socket events and DOM manipulation:\n1.  When a message enters the viewport and meets criteria (not a system message, partner is authorized), `io.readMessage()` is emitted.\n2.  The server broadcasts `chgread`.\n3.  `insertMessageStatus(msgid)` is called, which uses `waitForElementToDisplay` to ensure the DOM is ready before injecting the \"Read\" (既読) or \"Unread\" (未読) labels.\n\n### Image Uploads\nImages are not sent directly via Sockets. \n1.  `fileUpload(file)` sends a `multipart/form-data` POST request to `/quick/photoupload.json`.\n2.  Upon success, the resulting `photosid` is passed to `io.publishimg()`.\n3.  The socket server then broadcasts the message to both participants to render the image bubble.\n\n### Pagination (Infinite Scroll)\nThe module uses `iscroll-probe` and `vue-iscroll-view`. \n*   **Pull-down**: Triggers `io.prepend` with the `firstmsgid` to fetch older messages.\n*   **Pull-up**: Triggers `io.prepend` with the `lastmsgid` to fetch newer messages (used primarily during reconnection).\n\n### Security & Restrictions\n*   **Age Verification**: If `jsObject.age_check` is \"0\", most interactions (focusing input, clicking templates) are intercepted to show the `AgeCheckDialog`.\n*   **Browser \"Back\" Navigation**: The `handleSendButtonClick` function includes a specific check for users returning to the page via browser history. It verifies the partner's block/hide status via API before allowing a message to be sent, preventing \"zombie\" interactions.\n\n## Dependencies\n*   **Socket.io-client**: Real-time transport.\n*   **RxJS**: Event stream management.\n*   **Vue.js (v2)**: UI framework.\n*   **iScroll**: Smooth scrolling and pull-to-refresh on mobile.\n*   **Axios**: HTTP client for uploads and status checks.\n*   **StoreJS**: Local storage management for message persistence across reloads.","messaging-communication":"# Messaging & Communication\n\n# Messaging & Communication Module\n\nThe Messaging & Communication module is a hybrid communication engine that facilitates real-time user engagement, administrative inquiries, and system-wide notifications. It bridges server-side PHP logic (FuelPHP) with a reactive frontend (Vue.js/Socket.io) to provide a seamless chat experience.\n\n## Module Architecture\n\nThe module is split into two primary layers:\n*   **[Fuel (Server-side)](fuel.md)**: Manages the business logic, database persistence (MessagePool, MessageLog), session-based authentication, and point-based feature gating.\n*   **[Resources (Client-side)](resources.md)**: Handles the real-time transport layer via WebSockets, UI state management, and interactive components like image uploads and template selection.\n\n```mermaid\ngraph TD\n    subgraph \"Client (Resources)\"\n        UI[Vue.js UI]\n        SC[SocketClient.ts]\n        IDX[index.ts / Message Logic]\n    end\n\n    subgraph \"Server (Fuel)\"\n        CM[Controller_Message]\n        CML[Controller_Msglist]\n        CH[Controller_Mailbox]\n        DB[(Database / Models)]\n    end\n\n    UI <--> IDX\n    IDX <--> SC\n    SC <-->|WebSocket| CM\n    IDX <-->|JSON/REST| CML\n    IDX <-->|JSON/REST| CH\n    CM & CML & CH <--> DB\n```\n\n## Key Workflows\n\n### Real-Time Chat & Synchronization\nThe core chat flow utilizes `Controller_Message` to initialize sessions and `MessageClient` (Socket.io) for bidirectional delivery. \n1.  **Initialization**: `index.ts` initializes the `MessageClient` and authenticates using a `connectkey`.\n2.  **Transmission**: When a user sends a message, `handleSendButtonClick` triggers an emission through the socket.\n3.  **Persistence**: The server-side `action_publish` updates the `messagelog` and `messagepool` models to ensure history is preserved.\n4.  **State Updates**: Real-time events update read receipts and message status indicators via `insertMessageStatus`.\n\n### Conversation Management\nThe `Controller_Msglist` organizes interactions into distinct categories:\n*   **Matching Lists**: High-priority conversations derived from mutual user interest.\n*   **General Inbox**: Standard 1-on-1 messaging.\n*   **Favorites**: Managed via `setFavorite` in the frontend to filter the message list view.\n\n### System & Support Communication\nNon-peer-to-peer communication is routed through `Controller_Mailbox`. This handles:\n*   **Inquiry Timelines**: Direct support tickets between users and administrators.\n*   **Info Mail**: System-generated announcements and notifications.\n\n### Monetization & Verification\nThe module integrates with the platform's economy and safety features:\n*   **Point Access**: Functions like `checkPoinsAndBuyFuncRead` verify if a user has sufficient balance to access premium features (e.g., read receipts).\n*   **Age Verification**: Logic within the message controllers restricts communication capabilities based on the user's verification status.","other-agents-md":"# Other — AGENTS.md\n\n# GitNexus Agent Configuration (AGENTS.md)\n\nThe `AGENTS.md` file serves as the operational manifest and governance framework for AI agents (such as Claude or GitHub Copilot) interacting with the `mastersns-driver` repository. It defines the mandatory protocols for code exploration, impact assessment, and modification using the GitNexus Code Intelligence system.\n\n## Core Purpose\n\nThis module acts as a \"Rules of Engagement\" document. It ensures that any automated or semi-automated agent understands the scale of the project—which contains over 100,000 symbols—and adheres to safety checks to prevent regressions in a complex, highly interconnected codebase.\n\n## Mandatory Workflow Protocols\n\nThe module enforces a strict \"Analyze-Before-Act\" pattern. Developers and agents must follow these three phases for every change:\n\n### 1. Pre-Edit: Impact Analysis\nBefore any symbol (function, class, or method) is modified, you must determine the \"blast radius.\"\n- **Tool:** `gitnexus_impact({target: \"symbolName\", direction: \"upstream\"})`\n- **Requirement:** Report direct callers and affected processes.\n- **Risk Escalation:** If the tool returns **HIGH** or **CRITICAL** risk, you must pause and obtain explicit confirmation before proceeding.\n\n### 2. Execution: Context-Aware Modification\nStandard text-based search and replace is prohibited for structural changes.\n- **Refactoring:** Use `gitnexus_rename` for symbol changes to ensure the call graph remains intact.\n- **Exploration:** Use `gitnexus_query({query: \"concept\"})` to find execution flows rather than grepping for strings.\n- **Deep Dive:** Use `gitnexus_context({name: \"symbolName\"})` to retrieve the full relationship map (callers/callees) for a specific symbol.\n\n### 3. Post-Edit: Verification\nBefore committing any code, the state of the graph must be verified.\n- **Tool:** `gitnexus_detect_changes()`\n- **Requirement:** Verify that the changes only affected the intended symbols and that no unintended execution flows were broken.\n\n## Repository Architecture & Clusters\n\nThe `mastersns-driver` codebase is partitioned into functional clusters. When working within a specific domain, refer to the specialized skill files located in `.claude/skills/generated/`.\n\n| Cluster | Symbol Count | Primary Responsibility |\n| :--- | :--- | :--- |\n| **List** | 4,267 | Data listing and collection management |\n| **Search** | 4,244 | Query logic and indexing |\n| **Profile_edit** | 3,547 | User metadata modification logic |\n| **Auth** | 2,397 | Authentication and authorization flows |\n| **Model** | 1,812 | Data structures and schema definitions |\n| **Apiv2** | 424 | Modern API endpoints and routing |\n\n## Resource URIs\n\nAgents can access real-time intelligence via the following GitNexus resource paths:\n\n*   `gitnexus://repo/mastersns-driver/context`: Check if the index is stale. If stale, run `npx gitnexus analyze`.\n*   `gitnexus://repo/mastersns-driver/processes`: View all 300+ defined execution flows.\n*   `gitnexus://repo/mastersns-driver/process/{name}`: Trace a specific execution path step-by-step to debug logic errors.\n\n## Safety Constraints\n\n*   **Never** ignore impact analysis warnings.\n*   **Never** perform \"blind\" renames using standard IDE find-and-replace.\n*   **Always** refresh the index using the CLI if the GitNexus tool indicates the data is out of sync with the current file state.","other-ange-mastersns":"# Other — ange_mastersns\n\n# ange_mastersns Module Documentation\n\nThe `ange_mastersns` module serves as the core application layer for the \"Aocca\" social networking service. It is built on the **FuelPHP 1.8** framework and utilizes a modern frontend stack consisting of **TypeScript**, **Vue.js**, and **Laravel Mix** (Webpack).\n\n## System Architecture\n\nThe module follows a traditional MVC pattern on the backend, supplemented by a component-based architecture on the frontend.\n\n### Backend: FuelPHP\nThe backend handles business logic, database interactions (via Fuel ORM), and server-side rendering using Smarty templates.\n- **Core Framework:** FuelPHP 1.8 (Master branch).\n- **Template Engine:** Smarty 3.1.40.\n- **CLI Tooling:** The `oil` executable is used for migrations, scaffolding, and package management.\n\n### Frontend: TypeScript & Vue.js\nThe frontend is highly modularized, with TypeScript files compiled into specific public assets.\n- **State Management/UI:** Vue.js 2.6 with Class Components and Property Decorators.\n- **Build System:** Laravel Mix (Webpack wrapper) manages the compilation of TypeScript (`.ts`) and HTML assets.\n- **Real-time Features:** Integration with `socket.io-client` for messaging and notifications.\n\n---\n\n## Key Components & Directory Structure\n\n### 1. Configuration & Dependencies\n*   **`composer.json`**: Defines the PHP environment. Key integrations include AWS SDK, Google API Client, Amazon Pay, and Opauth for social logins (Facebook, Twitter, Google, YahooJP).\n*   **`package.json`**: Manages Node.js dependencies. Includes `axios` for API requests, `rxjs` for reactive programming, and `animejs` for animations.\n*   **`appspec.yml`**: AWS CodeDeploy configuration, defining file permissions and post-install hooks (e.g., clearing Smarty template caches).\n\n### 2. Frontend Asset Pipeline (`webpack.mix.js`)\nThe build process is granular. Instead of a single bundle, the system generates specific scripts for different application domains:\n- **Common:** `common.ts`, `dialog.ts`, `toast.ts`.\n- **Auth:** Login, registration, SMS/Mail verification logic.\n- **Profile:** Separate modules for editing, searching, and detail views.\n- **Social:** Community management, tweeting, and messaging (Socket.io).\n\n### 3. Core Execution Flow\nThe application entry point for CLI operations is the `oil` script.\n\n```mermaid\ngraph TD\n    A[oil CLI] --> B[Autoloader]\n    B --> C[Bootstrap App]\n    C --> D[Load Oil Package]\n    D --> E[Execute Command]\n    \n    F[Webpack/Mix] --> G[TypeScript Source]\n    G --> H[Public Assets /public/assets/js/]\n    H --> I[Smarty Templates]\n```\n\n---\n\n## Development Workflow\n\n### Prerequisites\n- PHP 7.4 or higher.\n- Node.js and NPM.\n- Composer.\n\n### Installation\n1. Install PHP dependencies:\n   ```bash\n   composer install\n   ```\n2. Install JavaScript dependencies:\n   ```bash\n   npm install\n   ```\n\n### Building Assets\nThe module uses `laravel-mix` for asset compilation.\n- **Development:** `npm run dev` (Generates source maps).\n- **Production:** `npm run pro` (Minifies code using `UglifyJsPlugin` and optimizes memory for large builds).\n\n### Deployment\nDeployment is handled via AWS CodeDeploy as defined in `appspec.yml`. \n- Files are moved to `/domain/aocca`.\n- Permissions are set to `webadm:apache`.\n- The script `fuel/shell/rm_templates_c.sh` is triggered after installation to ensure no stale compiled templates remain.\n\n---\n\n## Technical Specifications\n\n| Feature | Implementation |\n| :--- | :--- |\n| **Language** | PHP 7.4+, TypeScript 2.9+ |\n| **Frontend Framework** | Vue.js 2.x (Class-style) |\n| **Styling** | Handled via Laravel Mix (SASS/CSS) |\n| **Real-time** | Socket.io |\n| **Social Auth** | Opauth (Facebook, Twitter, Google, Yahoo) |\n| **Storage/Cloud** | AWS SDK (S3/etc.), CloudConvert |\n| **Payments** | Amazon Pay API SDK |\n\n## Notes for Contributors\n- **Type Safety:** All new frontend logic should be written in TypeScript. Refer to `tsconfig.json` for compiler options (ES5 target, ES2015 modules).\n- **Linting:** Run `tslint` before committing to ensure compliance with the project's `tslint.json` rules (e.g., no-console is disabled, but trailing commas are restricted).\n- **Template Caching:** If UI changes are not appearing, manually run the `rm_templates_c.sh` script or clear the `fuel/app/cache` directory.","other-claude-md":"# Other — CLAUDE.md\n\n# CLAUDE.md: Project Configuration & AI Guidance\n\nThe `CLAUDE.md` file serves as the primary entry point and operational manual for **Claude Code** and other AI assistants working within the MasterSNS (Aocca) repository. It defines the technical environment, architectural patterns, and safety protocols required to maintain the integrity of the platform's personality matching engine.\n\n## 1. Development Environment\n\nThe project utilizes a containerized stack for the backend and a modern build pipeline for the frontend.\n\n### Backend (FuelPHP 1.8)\n- **Runtime**: PHP-FPM via Docker.\n- **Database**: MySQL 8.0 and Redis.\n- **Management**: `docker-compose` handles the orchestration of Nginx, PHP, and storage layers.\n- **Testing**: Executed via the FuelPHP `oil` utility: `docker-compose exec angue_app php oil test`.\n\n### Frontend (Vue/TS)\n- **Tooling**: Laravel Mix (Webpack wrapper).\n- **Workflow**:\n    - `npm run dev`: Development build with source maps.\n    - `npm run pro`: Minified production build.\n- **Output**: Assets are compiled from `resources/assets/` into `public/assets/js/`.\n\n---\n\n## 2. System Architecture\n\nMasterSNS is built on a Hierarchical Model-View-Controller (HMVC) architecture.\n\n### Core Matching Engine\nThe business logic is centered around user compatibility, managed by specific ORM models in `fuel/app/classes/model/`:\n- `Model_Personality`: Core sex-specific traits.\n- `Model_SecretProfile`: Handles private data and bonus point calculations.\n- `Model_DeepProfile`: Manages advanced compatibility metrics.\n- `Model_MemberProfile`: The central hub linking users to their profile completion status.\n\n### Data Flow & Templates\n- **Controllers**: Inherit from `Controller_Front` to provide consistent session and authentication handling.\n- **Views**: Uses the **Smarty** templating engine (`.smarty` files).\n- **API**: Frontend components communicate with FuelPHP controllers via **Axios**, while **Socket.io** provides real-time capabilities for messaging.\n\n---\n\n## 3. GitNexus Integration & Safety\n\nThis module integrates with **GitNexus** to provide code intelligence. Because the codebase contains over 100,000 symbols, AI agents must follow strict \"Impact Analysis\" protocols to prevent regressions.\n\n### Mandatory Workflow for Developers/AI\n1.  **Impact Analysis**: Before modifying any function or class, run `gitnexus_impact` (upstream) to determine the \"blast radius.\"\n2.  **Risk Assessment**: If the impact analysis returns a **HIGH** or **CRITICAL** risk, the change must be flagged for manual review.\n3.  **Refactoring**: Use `gitnexus_rename` instead of global find-and-replace to ensure the call graph remains intact.\n4.  **Verification**: Run `gitnexus_detect_changes()` before every commit to ensure only intended symbols were modified.\n\n### Functional Areas (Clusters)\nThe codebase is partitioned into specialized clusters for easier navigation:\n- **Auth/Start**: Registration and authentication flows.\n- **Profile/Personality**: The core matching and profile management logic.\n- **Message/Community**: Social interaction and real-time communication.\n- **Payment**: Subscription and credit management.\n\n---\n\n## 4. Directory Structure\n\n| Path | Description |\n| :--- | :--- |\n| `/ange_mastersns` | Main application root. |\n| `.../fuel/app/classes/model` | Business logic and database entities. |\n| `.../fuel/app/classes/controller` | Web and API route handlers. |\n| `/resources/assets` | Source TypeScript, Sass, and Vue components. |\n| `/docker` | Infrastructure-as-code for local development. |\n| `.writer-memory/` | Contextual storage for narrative and persona-driven testing. |","overview":"# mastersns-driver — Wiki\n\n# Welcome to the MasterSNS Driver Wiki\n\nMasterSNS Driver is a robust social networking service backend and frontend framework. It is designed to handle high-concurrency social interactions, secure identity verification, and complex financial transactions. The system leverages a hybrid architecture, combining the stability of **FuelPHP 1.8** for server-side logic with the reactivity of **Vue.js and TypeScript** for the user interface.\n\n## System Architecture\n\nThe platform is built on a modular foundation where the [API Layer](api-layer.md) acts as the primary gateway for both web and native mobile clients. Business logic is distributed across specialized modules that interact through a centralized [Core Framework](core-framework-utilities.md).\n\n```mermaid\ngraph TD\n    Client[Web/Mobile Client] --> API[API Layer]\n    API --> Auth[Auth & User Management]\n    API --> Profile[Profile & Search]\n    API --> Social[Social & Messaging]\n    \n    Auth --> DB[(Dual DB: MGPF/Local)]\n    Social --> Media[Media Handling]\n    Social --> Safety[Safety & Verification]\n    \n    Profile --> Pay[Payment & Subscriptions]\n    Pay --> External[External Gateways]\n    \n    Cron[Batch Tasks & Cron] --> DB\n```\n\n## Core Functional Areas\n\n### User Lifecycle & Security\nThe journey begins with [Authentication & User Management](authentication-user-management.md), which utilizes a dual-database strategy to sync core platform data with local service details. To ensure platform integrity, the [Safety & Verification](safety-verification.md) module manages age validation and content moderation, while [Media Handling](media-handling.md) processes user uploads with automated watermarking and administrative review workflows.\n\n### Engagement & Communication\nUsers interact through [Social Features](social-features-aocca-community.md), which include interest-based communities and real-time \"Aocca\" meeting statuses. These interactions are supported by a robust [Messaging & Communication](messaging-communication.md) engine that facilitates real-time chat via Socket.io and a centralized [Email & Notifications](email-notifications.md) system for out-of-app engagement.\n\n### Monetization & Discovery\nThe [Profile & Search](profile-search.md) module allows users to discover others through complex filtering. Access to premium features is governed by the [Payment & Subscriptions](payment-subscriptions.md) module, which integrates with multiple external gateways (Credit Card, Amazon Pay, etc.) to manage point consumption and flat-rate plans.\n\n### Administration & Maintenance\nSystem health is maintained by [Batch Tasks & Cron](batch-tasks-cron.md), which handles daily data totalization and high-latency background jobs. Internal oversight is provided by the [Admin & Management Portal](admin-management-portal.md), offer
