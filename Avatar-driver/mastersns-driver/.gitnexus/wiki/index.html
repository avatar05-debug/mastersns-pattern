ing tools for moderation, analytics, and granular permission control.\n\n## Getting Started\n\nThe development environment is fully containerized using Docker.\n\n1.  **Initialize the project**: Run `make init` to build containers and run setup scripts.\n2.  **Start development**: Use `make dev` to see live logs or `make up` to run in the background.\n3.  **Access the Backend**: The FuelPHP application is accessible via `docker-compose exec angue_app /bin/bash`.\n4.  **Frontend Bundling**: Use `npm run dev` or `npm run watch` to compile Vue/TS assets via Laravel Mix.\n\nFor detailed information on specific utilities, such as device detection or data integrity helpers, refer to the [Core Framework & Utilities](core-framework-utilities.md) documentation. For third-party social logins and affiliate tracking, see [External Integrations](external-integrations.md).","payment-subscriptions":"# Payment & Subscriptions\n\n# Payment & Subscriptions Module\n\nThe Payment & Subscriptions module handles point purchases, subscription management (Flat Rate Packs), and Premium Pack upgrades. It integrates with multiple payment gateways (Credit Card, Bank Transfer, Convenience Store, Amazon Pay) and manages the logic for point consumption and member status transitions.\n\n## Core Components\n\n### Controllers\n- `Controller_Payment`: The primary entry point. Handles product selection (points vs. subscriptions), price calculations, and initial routing for all payment types.\n- `Controller_Payment_Base`: Provides shared utility methods for all payment drivers, including security token generation (`_createCreditToken`) and member status validation.\n- `Controller_Payment_Credit`: Manages credit card flows, including \"Quick Charge\" (one-click payment for returning users) via the BIGSUN gateway.\n- `Controller_Payment_Bank`: Handles manual bank transfer applications and order tracking.\n- `Controller_Payment_Conveni`: Manages convenience store payment flows (Direct and Download types), requiring user contact information.\n\n### Models\n- `Model_Product`: Defines available items. Products are categorized by `type` (Point, Flat Rate Pack, Premium) and `payment` method.\n- `Model_Order`: Tracks the lifecycle of a payment request, specifically for asynchronous methods like Bank and Convenience stores. Statuses include `REQUEST`, `PROCESSED`, `CANCEL`, `WAIT`, and `FINISH`.\n- `Model_Point`: Defines the cost of actions (e.g., sending a message, viewing a profile) based on member status and gender.\n- `Model_PointRate`: Manages the conversion logic from currency (Yen) to Points, including bonus point calculations for first-time vs. repeat buyers.\n\n## Payment Execution Flow\n\nThe module follows a standardized flow from selection to completion:\n\n```mermaid\ngraph TD\n    A[action_product] -->|Select Point/Sub| B[action_select]\n    B -->|Select Method| C{Payment Driver}\n    C -->|Credit| D[Controller_Payment_Credit]\n    C -->|Bank| E[Controller_Payment_Bank]\n    C -->|Conveni| F[Controller_Payment_Conveni]\n    D -->|Success| G[action_finished]\n    E -->|Apply| H[Model_Order::findOrCreate]\n    F -->|Request| I[MgPayment::settlementRequest]\n```\n\n### 1. Product Selection (`action_product`)\nDetermines if the user is eligible for the requested product.\n- Checks `isPaymentOfPointAvailable()` or `isPaymentOfSubscriptionAvailable()`.\n- Redirects users already subscribed to a \"Joining\" info page if they attempt to re-purchase an active subscription.\n\n### 2. Price & Status Validation (`checkPriceAndMemberStatus`)\nLocated in the base controller, this method ensures:\n- The product exists and is set to `DISPLAY_SHOW`.\n- The member's current `SubscriptionOrderStatus` allows for a new purchase (prevents overlapping subscriptions unless within the renewal window).\n- Users currently on Credit/AmazonPay subscriptions cannot switch to manual methods (Bank/Conveni) mid-cycle.\n\n### 3. Credit Card & Quick Charge\nThe system supports \"Quick Charge\" for users with saved payment info:\n- **First Time**: Redirects to the BIGSUN external payment site.\n- **Subsequent**: Calls `MgPayment::forge('credit')->quickCharge()`.\n- **Transaction Handling**: Uses dual-database transactions (`mgpf` and `default`) to ensure point addition and payment logging are atomic.\n\n## Point Logic & Consumption\n\nPoint consumption is handled by the `Point` utility class, which abstracts the complexity of member ranks and campaign rates.\n\n### `Point::usePointputMile`\nThis is the primary method for deducting points when a user performs an action.\n1. **First Attack (FA) Logic**: Checks `Model_FirstAttackLog`. If it's the user's first interaction with a specific target, it may apply a different point rate (`pt_fa`).\n2. **Coupling/Recent View**: For profile views, it checks if users are \"coupled\" or have viewed the profile within 24 hours to allow free access.\n3. **Transaction Safety**: Wraps the deduction in a DB transaction and updates `last_use_date` in `Model_MemberPayment`.\n\n### Point Conversion (`Model_PointRate::convertPrice2Point`)\nConverts Yen to Points using a tiered rate system:\n- Supports gender-specific rates.\n- Supports \"First Purchase\" bonuses (`man_f_point` vs `man_point`).\n- Iterates through `point_rates` table to calculate total points if the purchase spans multiple rate tiers.\n\n## Subscription Lifecycle\n\nSubscriptions (Flat Rate and Premium) modify the `members.status` and `member_payments` table.\n\n- **Auto-Renewal**: For Credit/AmazonPay, `auto_update_flat_rate_pack` is set to `1`.\n- **Manual Renewal**: For Bank/Conveni, a `Model_Order` is created with status `REQUEST`. The subscription is only extended once an admin or callback marks the order as `PROCESSED`.\n- **Overlap Prevention**: `Model_Order::changeToFinishOfSameType` is called during new purchases to invalidate pending orders of the same type, preventing double-billing.\n\n## Security & Tokens\n- **Credit Tokens**: `_setGeneratedCreditToken` creates a one-time token (`ct`) to prevent CSRF and double-submission during the payment redirect flow.\n- **Amazon Pay Tokens**: `_setApToken` and `_getApToken` manage session-based state for Amazon Pay redirects.\n- **Signatures**: `Controller_Api::getSignature` is globally set in `before()` to authorize subsequent API calls from the payment views.","profile-search-fuel":"# Profile & Search — fuel\n\n# Profile & Search — Fuel Module\n\nThe **Profile & Search** module is a core component of the application responsible for managing user identity, profile customization, and the discovery of other members. It handles the logic for profile editing, detailed profile viewing (including \"Secret\" and \"Deep\" profiles), and various search modalities (Main Search, Easy Search, and Aocca mode).\n\n## Module Overview\n\nThe module is divided into three primary controllers:\n1.  `Controller_Profile_Edit`: Manages the authenticated user's own data, including basic info, hobbies, and photo uploads.\n2.  `Controller_Profile_Detail`: Handles the rendering of profile pages for both the user and potential partners, including point-based access control for premium content.\n3.  `Controller_Profile_Search`: Implements the discovery engine, including \"Easy Search\" (keyword/category based) and the main recommendation list.\n\n## Core Components & Logic\n\n### 1. Profile Management (`Controller_Profile_Edit`)\nThis controller manages the lifecycle of user-provided data. It distinguishes between \"Basic\" data (stored in the main member tables) and \"Profile\" data (stored via `Model_MemberProfile`).\n\n*   **Validation Logic**: The `action_birthday` method implements strict age verification, ensuring users are at least 18 years old and not currently high school students based on the Japanese school year (April 1st cutoff).\n*   **Profile Completion**: Most update actions (e.g., `action_free_time`, `action_hobby`) trigger `Model_MemberProfile::chkProfilePercent`. This calculates the profile completion rate and may award \"Bonus Points\" to the user.\n*   **Photo Upload**: `action_photo_upload` handles multi-part image uploads. It generates three thumbnail sizes, calculates MD5 hashes for file integrity, and resets \"Photo Request\" flags upon successful upload.\n\n### 2. Discovery & Search (`Controller_Profile_Search`)\nThe search system provides multiple ways to find partners, heavily utilizing caching to maintain performance.\n\n*   **Anti-Reload Mechanism**: `action_index` implements a rate-limiting check. If a user refreshes the search list too frequently (defined by `RELOAD_WAIT_TIME` and `reload_limit_cnt`), a dialog is triggered to prevent scraping or server strain.\n*   **Easy Search (`action_easy`)**: A specialized search mode that displays two sets of \"Simple Search\" results. It prioritizes admin-configured settings (`Model_SimpleSearchSetting`) but falls back to random active categories if no specific settings are defined.\n*   **Aocca Mode**: Integrates real-time \"Aocca\" (instant meet-up) status into the search results, filtering for users who have active \"Aocca\" purposes.\n\n### 3. Profile Interaction (`Controller_Profile_Detail`)\nThis controller manages the viewing experience and the \"Point Economy\" associated with profile access.\n\n*   **Access Control & Points**: Viewing a partner's profile often requires consuming points. The module checks `Point::getPointTable` to determine costs.\n    *   **Prof Under (Secret Profile)**: Specialized personal info.\n    *   **Prof Deep (Deep Profile)**: Highly specific compatibility data.\n*   **Footprints**: Unless blocked or specifically disabled, visiting a profile automatically triggers `Model_Footprinta::add`, notifying the partner of the visit.\n*   **Privacy & Blocks**: The module strictly checks the `blocks` table. If a user is blocked by the partner, they are redirected or shown a \"Withdrawal\" state to maintain privacy.\n\n## Data Access Flow\n\nThe following diagram illustrates the execution flow when a user views a partner's profile:\n\n```mermaid\ngraph TD\n    A[action_partner] --> B{Is Blocked?}\n    B -- Yes --> C[Redirect/Withdrawal View]\n    B -- No --> D[Model_MemberProfile::getProfileDetail]\n    D --> E{Point Check Required?}\n    E -- Yes --> F[Point::usePointputMile]\n    F -- Success --> G[Model_Footprinta::add]\n    E -- No --> G\n    G --> H[Render View_Smarty]\n    H --> I[AccessLog::countUp]\n```\n\n## Key Function References\n\n| Function | Location | Purpose |\n| :--- | :--- | :--- |\n| `_setProf` | `Controller_Profile_Edit` | Internal helper to save profile data and handle transactions/bonus points. |\n| `action_partner` | `Controller_Profile_Detail` | Main entry point for viewing another user; handles point deduction and footprinting. |\n| `action_easy` | `Controller_Profile_Search` | Logic for the \"Easy Search\" dashboard with randomized/configured categories. |\n| `chkProfilePercent` | `Model_MemberProfile` | Calculates how much of a profile is filled; used for gamification/point rewards. |\n| `awsPhotoGetCommon` | `Controller_Photo` | Utility used by Detail controllers to fetch signed URLs for profile/sub photos. |\n\n## Implementation Details\n\n### Point Consumption Logic\nPoint consumption is handled within `action_partner`, `action_secret`, and `action_deep`. The system uses a \"Double Check\" pattern:\n1.  Check if the user has already paid for this specific partner's data (`Point::checkSecretProfPaid`).\n2.  If not, verify current point balance against the `point_table`.\n3.  Execute `Point::usePointputMile` within a DB transaction.\n4.  Log the transaction in `Model_ProcessLog`.\n\n### Personality Integration\nThe module integrates a \"Personality\" sub-system. If the `ITEM_PERSONALITY` extend switch is ON, `action_partner` and `action_myself` will fetch radar chart data via `Model_PersonalityLog::getPersonalityLog`. This data is used to display compatibility and \"Favorite Tags\" on the profile.\n\n### Search Caching\nTo reduce DB load, `action_index` in the Search controller manages a `default_search_cached_limit`. Search results are cached for a set number of minutes (defined in `Model_Search::DEFAULT_SEARCH_CACHED_LIMIT`). The cache is only invalidated if the timer expires or the user changes their search criteria.","profile-search-resources":"# Profile & Search — resources\n\n# Profile & Search — Resources Module\n\nThis module manages the core user-facing functionality for searching member profiles and managing the authenticated user's own profile data. It is built using Vue.js (2.x) and TypeScript, acting as the orchestration layer between the UI components, local data models, and the backend API.\n\n## Module Overview\n\nThe module is divided into two primary functional areas:\n1.  **Search View Management (`SearchProfViewModel`)**: Handles the search results list, filtering, sorting, and a complex sequence of onboarding/promotional dialogs.\n2.  **Profile Editing (`ProfileEdit`)**: Manages the user's own profile information, including asynchronous photo uploads, real-time field validation, and profile completion tracking.\n\n---\n\n## Search & Discovery (`SearchProfViewModel`)\n\nThe `SearchProfViewModel` extends `SearchBaseViewModel` to provide a specialized view for browsing member profiles. It coordinates several sub-components and manages the lifecycle of various \"interrupt\" dialogs (promotions, bonuses, and tutorials).\n\n### Key Responsibilities\n-   **Component Orchestration**: Initializes `SearchProfList` for the result grid and `SearchHeader` for navigation and sorting.\n-   **State Management**: Tracks search parameters and updates the UI when data is empty or filtered.\n-   **Dialog Sequencing**: Implements a chain of modals that appear upon login or registration (Intro 1 → Intro 2 → Intro 3 → Pickup Explain → Free Trial → Point Campaign → Login Bonus).\n-   **Aocca Integration**: Manages the \"Aocca\" (matching/status) feature, including start/stop toasts and pause state dialogs.\n\n### Search Execution Flow\nWhen a user changes the sort order (e.g., from \"Login Order\" to \"Recommended\"), the following flow occurs:\n\n```mermaid\ngraph TD\n    A[User changes SortType] --> B[changeSortType Method]\n    B --> C[Show Loading Indicator]\n    B --> D[Request getNewSearchData from Model]\n    D --> E{API Response}\n    E -->|Success| F[Update searchProfList]\n    E -->|Success| G[Hide Indicator]\n    F --> H[changeSearchProfDataMember]\n    H --> I[Update CSS Classes/Empty State]\n```\n\n### Critical Methods\n-   **`changeSortType(value)`**: Triggers a fresh API call via the model and resets the list view state.\n-   **`showAoccaStartMessage()`**: Determines if the user should see a first-time tutorial or a standard start toast based on `jsObject` data.\n-   **`setWebNoticeFlgOffById()`**: An asynchronous utility that notifies the server when a specific banner or notice has been acknowledged.\n\n---\n\n## Profile Management (`ProfileEdit`)\n\nThe `ProfileEdit` class handles the logic for the `/profile/edit/top` page. It uses a hybrid approach, combining standard jQuery event listeners for form inputs with Vue instances for complex image management.\n\n### Photo Management\nThe module supports two types of photos:\n1.  **Profile Photo**: The primary user image.\n2.  **Sub Photos**: Additional appeal images.\n\n**Upload Process:**\n1.  `onFileChange` captures the file and triggers `checkFile` (validating extension and size).\n2.  `showPhotoPreviewDialog` (from `CommonDialog`) is called for user confirmation.\n3.  `fileUpload` sends a `FormData` request to `/profile/edit/photo_upload`.\n4.  Upon success, it triggers a completion dialog and redirects the user.\n\n### Real-time Profile Updates\nInstead of a single \"Save\" button, the module performs incremental saves as the user interacts with the form:\n-   **Dropdowns/Selects**: Trigger `setMemberProf` or `setPrefCode` on change.\n-   **Checkboxes (Purpose/Holidays)**: Use custom jQuery logic to handle \"Unset\" logic (e.g., checking \"Unset\" clears all other specific options).\n-   **Bonus Tracking**: If an update completes a profile section, `BonusPtAddToast` displays the earned points returned by the API.\n\n### Key Methods\n-   **`setMemberProf(name, val)`**: Sends a POST request to `/apiv2/mem/set_member_prof.json`. Updates the \"Profile Completion Percentage\" bar in the UI dynamically.\n-   **`fileDelete(setType, subNo)`**: Removes an image and updates the UI (either resetting to a silhouette or removing the DOM element) without a page reload.\n\n---\n\n## Integration with Global State\n\nThe module relies heavily on a global `jsObject` (declared in the PHP/Smarty templates). This object provides:\n-   **Signatures**: Security tokens for API requests.\n-   **Initial State**: Flags like `isAcceptedPrivacyPolicy`, `isRookie`, and `accessTime`.\n-   **User Agent Info**: Used to apply iOS-specific fixes, such as `bgFixStart()` to prevent background scrolling when modals are open.\n\n## Error Handling\nBoth sub-modules utilize a centralized `ErrorDialog` class. API failures (non-200 status codes or `success` flags not equal to `Consts.API_SUCCESS_OK`) are passed to `errorDialog.showError(code)`, which maps internal error codes to user-friendly messages.","profile-search":"# Profile & Search\n\n# Profile & Search Module\n\nThe **Profile & Search** module is a comprehensive system responsible for user identity management and member discovery. It bridges backend business logic (FuelPHP) with a reactive frontend (Vue.js/TypeScript) to facilitate profile customization, complex search filtering, and premium content access.\n\n## Module Architecture\n\nThe module operates through a tight integration between server-side controllers and client-side view models:\n\n*   **[Profile & Search — Fuel](fuel.md)**: Acts as the backend engine. It manages data persistence, point-based access control for \"Secret\" and \"Deep\" profiles, and complex SQL query building for various search modes (Aocca, Easy Search, and Main Search).\n*   **[Profile & Search — Resources](resources.md)**: Serves as the orchestration layer for the UI. It utilizes Vue.js and TypeScript to handle real-time profile validation, asynchronous photo uploads, and the state management of search result lists.\n\n```mermaid\ngraph TD\n    subgraph Resources [Frontend: Resources]\n        VM[SearchProfViewModel]\n        PE[ProfileEdit Vue]\n    end\n\n    subgraph Fuel [Backend: Fuel]\n        C_Edit[Controller_Profile_Edit]\n        C_Det[Controller_Profile_Detail]\n        C_Search[Controller_Profile_Search]\n        M_Mem[Model_MemberProfile]\n    end\n\n    PE <--> C_Edit\n    VM <--> C_Search\n    C_Search --> M_Mem\n    C_Det --> M_Mem\n```\n\n## Key Workflows\n\n### Profile Management & Validation\nThe module facilitates a seamless transition from data entry to persistence. `ProfileEdit` in the Resources module handles real-time field validation and photo uploads via `fileUpload`. These requests are processed by `Controller_Profile_Edit`, which updates the core member data and tracks profile completion percentages.\n\n### Discovery and Search Modalities\nThe system supports multiple discovery paths managed by `Controller_Profile_Search` and rendered via `SearchProfViewModel`:\n*   **Main Search**: Standard filtering and sorting.\n*   **Easy Search**: Simplified discovery using `getActivedSimpleSearchData`.\n*   **Aocca Mode**: A specialized search mode utilizing specific sorting logic.\n*   **Pickup**: Curated member discovery via `_makePickup`.\n\n### Access Control and Premium Content\nThe `Controller_Profile_Detail` manages the logic for viewing profiles. It distinguishes between standard profile data and restricted content (Secret/Deep profiles). Access to these areas often triggers point-based transactions or specific session checks (e.g., `action_secret` or `action_myself`) to ensure the authenticated user has the necessary permissions to view the requested data.\n\n### Data Formatting and Normalization\nTo ensure consistency across the UI, the module uses centralized formatting methods. `Model_MemberProfile` and `Model_ProfileData` handle the conversion of raw database values into display-ready strings, such as converting newlines for text areas or formatting area data for \"Haunt\" locations.","safety-verification":"# Safety & Verification\n\n# Safety & Verification Module\n\nThe Safety & Verification module is a critical security layer responsible for user age validation, content moderation via NG-word filtering, and interpersonal safety through blocking and reporting mechanisms.\n\n## 1. Age Verification System\n\nThis sub-module handles the submission and administrative review of identification documents to verify that users meet age requirements.\n\n### User-Facing Flow (`Controller_AgeVerification`)\nUsers upload identification documents (Driver's License, Health Insurance, etc.) which are processed and stored in S3.\n\n*   **Document Types**: Defined by constants like `DETAIL_NAME_DRIVER`, `DETAIL_NAME_PASSPORT`, etc.\n*   **Image Processing**: \n    *   `action_file_upload`: Handles AJAX uploads. It performs image reduction (`_reductionImage`), orientation correction (`Common::changeOrientation`), and generates a unique hash to detect duplicate submissions.\n    *   **S3 Storage**: Files are moved to an S3 bucket defined by `Consts::S3BUCKET_AGE`.\n    *   **Thickness Verification**: For high-risk documents (Driver's License, My Number Card), the system requires an \"edge\" (thickness) photo to prevent the use of printed paper copies.\n*   **Manual Redaction**: `action_brush` allows users to \"paint over\" sensitive information on their ID before final submission.\n\n### Administrative Review (`Model_Agecheck`)\nThe `setAgecheck` function is the core logic for the admin review interface.\n\n*   **Status Transitions**: Updates `members.age_check` based on the review result.\n*   **Automated Rewards**: Upon successful verification, `Model_BonusPoint::getAgeCheckPt` is called to grant service points to the user.\n*   **NG Notifications**: If a document is rejected, the system automatically sends a specific email (e.g., `MAIL_AGE_CHECK_NG_EXCLUDED_CERTIFICATE`) and logs the reason in the member's internal notes.\n\n### AI Integration (`Controller_Aieyetrust_Agecheck`)\nThe system integrates with \"AiEyeTrust\" for automated thickness/authenticity checks.\n*   **Callback**: `post_result` receives JSON payloads from the external AI service and updates `aieyetrust_result` in the `age_check_photos` table.\n*   **Security**: `isAllowIP` restricts callback access to authorized IP ranges defined in the configuration.\n\n---\n\n## 2. Content Moderation (NG-Word System)\n\n`Model_NgWord` provides a robust filtering engine used across the platform (Profiles, Messages, Tweets, etc.).\n\n### Filter Types\n| Type | Constant | Action |\n| :--- | :--- | :--- |\n| **Forbidden** | `TYPE_NG_WORD` | Blocks submission or triggers validation error. |\n| **Guard** | `TYPE_GUARD` | Replaces text with asterisks (`*`). |\n| **Extract** | `TYPE_EXTRACT` | Highlights text in admin view for manual review. |\n| **Auto-Report** | `TYPE_REPORT` | Silently flags the content for administrative attention. |\n\n### Core Logic: Normalization\nTo prevent users from bypassing filters using full-width/half-width variations or different Kana types, the module uses `_convertNgWordCheckStr`:\n1.  Converts small characters to large (ァ -> ア).\n2.  Converts all Kana to half-width to normalize voiced sound marks (濁点).\n3.  Converts back to full-width for a standardized comparison string.\n\n### Key Methods\n*   **`setGuardWordReplaceAsterisk`**: Used in `InMsg` and `Tag` classes to sanitize output.\n*   **`setNgWordColoring`**: Used in admin panels to highlight violations. It uses a complex position-tracking algorithm (`getNgWordPositionInText`) to ensure nested tags (e.g., a Guard word inside an Extract word) do not break HTML structure.\n*   **`ngWordValidation`**: Returns a boolean and the specific matched words for use in FuelPHP Validation objects.\n\n---\n\n## 3. User Safety (Blocking & Reporting)\n\n### Reporting (`Model_Report`)\nAllows users to flag inappropriate content.\n*   **Context Aware**: Reports are linked to specific \"places\" (Profile, Message, Tweet, etc.) via `Model_NgWord` constants.\n*   **Process Logging**: Every report creates a `Model_ProcessLog` entry to maintain an audit trail for administrators.\n\n### Blocking (`Model_Block`)\nHandles user-level restrictions.\n*   **`add` / `release`**: Manages the relationship between `from_members_id` and `to_members_id`.\n*   **Caching**: `doCachingLimitData` is used to optimize performance when generating member lists, ensuring blocked users are excluded from search results and visibility.\n*   **Limits**: `isLimited` checks if a user has exceeded the maximum number of allowed blocks (defined in `Consts::LIMIT_HIDE_BLOCK_MEMBER`).\n\n---\n\n## 4. Data Architecture\n\n```mermaid\ngraph TD\n    M[Model_Member] --> AC[Model_Agecheck]\n    AC --> ACP[Model_AgecheckPhoto]\n    M --> R[Model_Report]\n    M --> B[Model_Block]\n    \n    NW[Model_NgWord] -.->|Filters| R\n    NW -.->|Sanitizes| MSG[Messages/Profiles]\n    \n    ACP --> S3[(S3 Bucket: Age)]\n    ACP --> AI[AiEyeTrust API]\n```\n\n## 5. Developer Integration Patterns\n\n### Adding a New NG-Word Check\nWhen validating a new input field, use the helper pattern:\n```php\n$val = Validation::forge();\n$val->add_field('content', 'Content', 'required')\n    ->add_rule('ng_word_validation', Model_NgWord::CONTENT_MESSAGE);\n```\n\n### Checking Age Verification Status\nAlways check the `age_check` property on the Member object:\n```php\nif ($member->age_check != Model_Member::AGE_CHECK_PHOTO) {\n    Response::redirect('ageverification/index');\n}\n```\n\n### Handling Image Uploads\nWhen adding new verification document types, ensure the `_reductionImage` method is called to maintain storage efficiency and strip metadata before S3 upload.","social-features-aocca-community":"# Social Features (Aocca & Community)\n\n# Social Features (Aocca & Community) Module\n\nThe Social Features module manages the core engagement mechanics of the platform, including user-generated communities, real-time status updates (Tweets), and the \"Aocca\" (real-time meeting) system. It facilitates user discovery through shared interests and temporal availability.\n\n## Module Overview\n\nThe module is divided into three primary functional areas:\n1.  **Communities**: Interest-based groups where users can join, create, and discover others with similar hobbies or traits.\n2.  **Tweets**: A micro-blogging feature allowing users to post text and photos, share content, and interact via \"Nices\" (likes).\n3.  **Aocca**: A specialized real-time status system that signals a user's immediate availability for interaction, often with a specific purpose.\n\n---\n\n## 1. Community Management\n\nThe community system is handled by `Controller_Community` and `Model_Community`. It supports both official (admin-created) and user-created groups.\n\n### Key Functionalities\n*   **Discovery**: Communities are categorized by type: `TYPE_OFFICIAL`, `TYPE_USERS`, `TYPE_HOT`, and `TYPE_NEW_ARRIVAL`.\n*   **Creation**: Users can create communities via `action_create`. This involves a multi-step process: category selection, photo upload, and validation against unique names.\n*   **Membership**: Handled via `Model_JoinCommunity`. The `action_detail` view displays members within a community, filtered by the current user's preferences.\n*   **Same Community Discovery**: `Model_Community::getSameCommunity` identifies potential matches who have recently joined the same groups as the authenticated user.\n\n### Community Types (`Model_Community` Constants)\n| Constant | Description |\n| :--- | :--- |\n| `TYPE_OFFICIAL` | Groups created by administrators. |\n| `TYPE_USERS` | Groups created by the user base. |\n| `TYPE_HOT` | Groups with high recent activity (shuffled for variety). |\n| `TYPE_MEMBER` | Groups the current user has joined. |\n\n---\n\n## 2. Tweet System\n\nThe Tweet system (`Controller_Tweet`) provides a social feed. It includes complex logic for visibility, filtering, and content sharing.\n\n### Execution Flow: Feed Generation\nThe `action_index` method generates the main feed using `Model_Tweet::getLists`.\n\n```mermaid\ngraph TD\n    A[action_index] --> B{Check Cache/Session}\n    B -- Page 1 --> C[Model_Tweet::getLists]\n    B -- Page > 1 --> D[Load Cached IDs]\n    C --> E[Apply Block/Hide Filters]\n    E --> F[Apply Public/Follower Visibility]\n    F --> G[Hydrate Member Data & Photos]\n    G --> H[Return Smarty View]\n```\n\n### Content Security & Moderation\n*   **NG Words**: Content is passed through `Model_NgWord::setGuardWordReplaceAsterisk` to mask prohibited terms.\n*   **Admin Checks**: Tweets have a `check` status (`CHECK_NONE`, `CHECK_OK`, `CHECK_NG`). Content marked as `CHECK_NG` is excluded from queries via `_getNotExistQuery`.\n*   **Visibility Logic**: Tweets respect complex visibility rules (`public_general`, `public_follow`, `public_follower`).\n\n---\n\n## 3. Aocca (Real-time Status)\n\nAocca is an API-driven feature (`Controller_Apiv2_Aocca`) that manages short-term availability states.\n\n### Core API Endpoints\n*   **`post_start`**: Initiates an Aocca session. It validates if the user is already in a session or under a restriction (`is_dorman`). It also triggers `Mail::MAIL_AOCCA_NOTICE` to relevant followers.\n*   **`post_stop`**: Manually terminates the session and logs the action in `Model_ProcessLog`.\n*   **`post_get_aocca`**: Returns the current session's `start_time`, `end_time`, and `limit_time` (cooldown).\n\n### Purpose System\nUsers select an `aocca_purpose_id` (e.g., \"Looking for lunch,\" \"Want to chat\"). These are retrieved via `Model_AoccaPurpose::getAoccaPurposeList` based on the user's gender.\n\n---\n\n## 4. Technical Implementation Details\n\n### Photo Handling\nBoth Communities and Tweets utilize a shared upload pattern:\n1.  **Temporary Upload**: Files are uploaded to a temporary directory via `Model_Community::fileUpload` or `Common::fileUpload`.\n2.  **Processing**: Images are resized into three thumbnails (`thumbnail1`, `thumbnail2`, `thumbnail3`).\n3.  **Persistence**: Paths are stored in the `photos` table. Tweet photos are specifically linked via `photos_id` in the `tweets` table.\n4.  **CDN Integration**: Image URLs are generated using `Config::get('site.url.cdndomain')` and often involve `MyEncrypt::encrypt` for security.\n\n### Pagination & Caching\nTo maintain performance across large datasets, the module uses a \"Page ID Caching\" strategy:\n*   **Initial Load**: The system queries for a large set of IDs matching the criteria and stores them in a temporary file/session (`Common::saveTempfile`).\n*   **Subsequent Pages**: Instead of re-running complex JOINs, the system slices the cached ID list and hydrates only the required records for the current page.\n*   **Reload Detection**: Uses `HTTP_CACHE_CONTROL` to determine if the cache should be bypassed.\n\n### Security & Signatures\nAPI interactions (especially in Aocca) require a signature check via `Controller_Api::signatureCheck()`. This ensures that requests are authenticated and have not been tampered with during transit.\n\n### Database Patterns\n*   **Replica Usage**: Heavy read operations (like `getCommunityTopDatas`) explicitly use `execute('replica')` to offload the primary database.\n*   **Soft Deletes**: Most models implement `deleted_at` checks within their query builders to ensure data integrity.","ui-components-dialogs":"# UI Components & Dialogs\n\n# UI Components & Dialogs Module\n\nThe UI Components & Dialogs module provides a standardized framework for displaying modal overlays, user notifications (toasts), and loading indicators across the application. It leverages Vue.js for component structure and Anime.js for animations, while providing a non-Vue `CommonDialog` wrapper for legacy or global script integration.\n\n## Core Functionality\n\n### Background Scrolling Management\nTo prevent \"background scroll\" when a modal is active, the module provides two utility functions:\n- `bgFixStart()`: Captures the current scroll position and applies a `bg_fix` CSS class to the body.\n- `bgFixEnd()`: Removes the fix and restores the user's previous scroll position.\n\n### Loading Indicators\nThe module manages global loading states via `showIndicator()` and `hideIndicator()`. These functions inject a spinner into the DOM (either `.cp-container` or `.fl-container`) and optionally trigger the background fix.\n\n---\n\n## Vue Components\n\nThe module defines several reusable Vue components located in `resources/assets/js/components/`.\n\n### `OkCancelDialog.ts`\nA standard confirmation modal with two buttons.\n- **Slots**: `header`, `body`, `cancelBtn`, `okBtn`, `footer`.\n- **Events**: \n  - `@click`: Emitted when the OK button is pressed.\n  - `@close`: Emitted when either button is pressed.\n\n### `AgeCheckDialog.ts`\nA specialized modal for age verification gates.\n- **Props**: \n  - `page_title`: The name of the restricted page.\n  - `pointpresent`: Points awarded upon verification.\n- **Action**: Redirects the user to `/ageverification/index`.\n\n### `NiceDialog.ts`\nUsed for social interactions (e.g., \"Nice\" or \"Like\" actions).\n- **Slots**: `photoPartner` (for user avatars), `body`, `niceItemList`.\n\n---\n\n## The CommonDialog Class\n\nThe `CommonDialog` class in `dialog.ts` acts as a singleton-style controller that initializes and manages multiple Vue instances tied to specific DOM elements (e.g., `#ngword_dialog`, `#photo_edit_dialog`).\n\n### Usage Pattern\nTo use a common dialog, instantiate the class and call the relevant `show` method:\n\n```typescript\nimport { CommonDialog } from \"./dialog\";\nconst dialogs = new CommonDialog();\n\n// Show a specific dialog\ndialogs.showNgwordDialog();\n```\n\n### Key Methods\n| Method | Purpose |\n|:---|:---|\n| `showPhotoPreviewDialog(file, callback)` | Uses `blueimp-load-image` to parse metadata and display a local image preview before upload. |\n| `showListHeaderMenuDialog(...)` | Displays a context menu for list views (Delete, Release, Withdraw). It automatically clears specific `sessionStorage` keys related to list pagination when actions are taken. |\n| `showProfCompDialog(pt)` | Displays a specialized \"100% Profile Completion\" celebration modal. |\n| `showAoccaLimitDialog()` | Displays a restriction notice for the \"Aocca\" feature. |\n\n---\n\n## Toast Notifications\n\nThe `Toast` class provides transient, non-blocking feedback messages. Unlike the Dialog components, Toasts are generated dynamically in the DOM and self-destruct after their animation completes.\n\n### `Toast.show(text, scrollFlag)`\n- **Animation**: Uses Anime.js to fade in (300ms), pause (1500ms), and fade out (300ms).\n- **Interaction Blocking**: If `scrollFlag` is true, the class attaches event listeners to `touchmove`, `DOMMouseScroll`, and specific key codes (Space, Arrows) to prevent user interaction while the toast is visible.\n\n---\n\n## Architecture Diagram\n\nThe following diagram illustrates how the `CommonDialog` controller orchestrates various Vue components and interacts with the browser environment.\n\n```mermaid\ngraph TD\n    subgraph Controller\n        CD[CommonDialog Class]\n    end\n\n    subgraph Vue Components\n        CD -->|mounts| OKCD[OkCancelDialog]\n        CD -->|mounts| AD[AgeCheckDialog]\n        CD -->|mounts| LMD[ListMenuDialog]\n    end\n\n    subgraph Utilities\n        CD -->|calls| BF[bgFixStart / bgFixEnd]\n        CD -->|calls| IND[showIndicator / hideIndicator]\n        T[Toast Class] -->|uses| Anime[Anime.js]\n    end\n\n    subgraph External\n        LI[blueimp-load-image] --> CD\n    end\n```\n\n## Implementation Details\n\n### List Menu Session Clearing\nThe `showListHeaderMenuDialog` is tightly coupled with the application's caching strategy. When a user performs an action (like withdrawing or deleting) via this dialog, the module clears `sessionStorage` for:\n- `footprint_list`\n- `message_list`\n- `nice_list`\n- `favorite_list`\n- `block_list`\n- And several others to ensure the UI reflects the updated state upon the next navigation.\n\n### Image Preview Logic\nThe `photoPreviewDialog` within `CommonDialog` handles complex client-side image processing:\n1. Calls `LoadImage.parseMetaData` to handle EXIF data.\n2. Renders the image to a Canvas.\n3. Converts the canvas to a DataURL with `0.5` quality (specifically to support Android Firefox compatibility).\n4. Displays the preview and executes the provided `callback` only if the user confirms."};

    renderMeta();
    renderNav();
    document.getElementById('menu-toggle').addEventListener('click', function() {
      document.getElementById('sidebar').classList.toggle('open');
    });
    if (location.hash && location.hash.length > 1) {
      activePage = decodeURIComponent(location.hash.slice(1));
    }
    navigateTo(activePage);
  });

  function renderMeta() {
    if (!META) return;
    var el = document.getElementById('meta-info');
    var parts = [];
    if (META.generatedAt) {
      parts.push(new Date(META.generatedAt).toLocaleDateString());
    }
    if (META.model) parts.push(META.model);
    if (META.fromCommit) parts.push(META.fromCommit.slice(0, 8));
    el.textContent = parts.join(' \u00b7 ');
  }

  function renderNav() {
    var container = document.getElementById('nav-tree');
    var html = '<div class="nav-section">';
    html += '<a class="nav-item overview" data-page="overview" href="#overview">Overview</a>';
    html += '</div>';
    if (TREE.length > 0) {
      html += '<div class="nav-group-label">Modules</div>';
      html += buildNavTree(TREE);
    }
    container.innerHTML = html;
    container.addEventListener('click', function(e) {
      var target = e.target;
      while (target && !target.dataset.page) { target = target.parentElement; }
      if (target && target.dataset.page) {
        e.preventDefault();
        navigateTo(target.dataset.page);
      }
    });
  }

  function buildNavTree(nodes) {
    var html = '';
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      html += '<div class="nav-section">';
      html += '<a class="nav-item" data-page="' + escH(node.slug) + '" href="#' + encodeURIComponent(node.slug) + '">' + escH(node.name) + '</a>';
      if (node.children && node.children.length > 0) {
        html += '<div class="nav-children">' + buildNavTree(node.children) + '</div>';
      }
      html += '</div>';
    }
    return html;
  }

  function escH(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function navigateTo(page) {
    activePage = page;
    location.hash = encodeURIComponent(page);

    var items = document.querySelectorAll('.nav-item');
    for (var i = 0; i < items.length; i++) {
      if (items[i].dataset.page === page) {
        items[i].classList.add('active');
      } else {
        items[i].classList.remove('active');
      }
    }

    var contentEl = document.getElementById('content');
    var md = PAGES[page];

    if (!md) {
      contentEl.innerHTML = '<div class="empty-state"><h2>Page not found</h2><p>' + escH(page) + '.md does not exist.</p></div>';
      return;
    }

    contentEl.innerHTML = marked.parse(md);

    // Rewrite .md links to hash navigation
    var links = contentEl.querySelectorAll('a[href]');
    for (var i = 0; i < links.length; i++) {
      var href = links[i].getAttribute('href');
      if (href && href.endsWith('.md') && href.indexOf('://') === -1) {
        var slug = href.replace(/\.md$/, '');
        links[i].setAttribute('href', '#' + encodeURIComponent(slug));
        (function(s) {
          links[i].addEventListener('click', function(e) {
            e.preventDefault();
            navigateTo(s);
          });
        })(slug);
      }
    }

    // Convert mermaid code blocks into mermaid divs
    var mermaidBlocks = contentEl.querySelectorAll('pre code.language-mermaid');
    for (var i = 0; i < mermaidBlocks.length; i++) {
      var pre = mermaidBlocks[i].parentElement;
      var div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = mermaidBlocks[i].textContent;
      pre.parentNode.replaceChild(div, pre);
    }
    try { mermaid.run({ querySelector: '.mermaid' }); } catch(e) {}

    window.scrollTo(0, 0);
    document.getElementById('sidebar').classList.remove('open');
  }
})();

</script>
</body>
</html>
